<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kuis Layanan Web</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #f8fafc;
        min-height: 100vh;
      }

      .header {
        background-color: #1d2d44;
        color: white;
        padding: 16px 24px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .header .timer {
        display: flex;
        align-items: center;
        gap: 8px;
        color: #94a3b8;
      }

      .timer .time {
        background: rgba(255, 255, 255, 0.1);
        padding: 4px 12px;
        border-radius: 20px;
      }

      .quiz-sidebar {
        background-color: #475569;
        border-radius: 12px;
        padding: 24px;
        margin-bottom: 24px;
      }

      .info-box {
        background-color: #475569;
        border-radius: 16px;
        padding: 28px;
        margin-bottom: 24px;
      }

      .info-box h6 {
        color: white;
        font-size: 20px;
        margin-bottom: 24px;
        text-align: center;
      }

      .info-item {
        display: flex;
        align-items: flex-start;
        gap: 16px;
        margin-bottom: 20px;
        color: #e2e8f0;
      }

      .info-item:last-child {
        margin-bottom: 0;
      }

      .info-item img {
        width: 20px;
        height: 20px;
        opacity: 0.7;
      }

      .info-item div {
        display: flex;
        flex-direction: column;
      }

      .info-item div span:first-child {
        color: white;
        font-weight: 500;
        font-size: 14px;
        margin-bottom: 4px;
      }

      .info-item div span:last-child {
        color: #94a3b8;
        font-size: 13px;
      }

      .question-box {
        background-color: #1e293b;
        border-radius: 12px;
        padding: 24px;
      }

      .question-box h6 {
        color: white;
        margin-bottom: 20px;
        font-size: 18px;
      }

      .number-grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 12px;
      }

      .number-btn {
        background: rgba(71, 85, 105, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: white;
        padding: 10px;
        border-radius: 8px;
        width: 100%;
        font-size: 14px;
        transition: all 0.2s ease;
      }

      .number-btn:hover {
        background: rgba(71, 85, 105, 0.8);
      }

      /* Style for active/selected number */
      .number-btn.active {
        background: #475569;
        border-color: rgba(255, 255, 255, 0.2);
      }

      .quiz-content {
        background-color: #1e293b;
        border-radius: 12px;
        padding: 32px;
        color: white;
      }

      .answer-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
        margin-top: 24px;
      }

      .answer-option {
        background-color: white;
        border: none;
        color: #1e293b;
        padding: 16px;
        border-radius: 8px;
        width: 100%;
        text-align: left;
      }

      .nav-buttons {
        margin-top: 32px;
        display: flex;
        justify-content: space-between;
      }

      .btn-nav {
        padding: 8px 24px;
        border-radius: 8px;
        color: white;
        border: none;
      }

      .btn-prev {
        background-color: #475569;
      }

      .btn-next {
        background-color: #64748b;
      }
    </style>
  </head>
  <body>
    <header class="header">
      <h5 class="mb-0">Kuis Layanan Web</h5>
      <div class="timer">
        <span>Soal 1 dari 20</span>
        <div class="time">30</div>
      </div>
    </header>

    <div class="container py-4">
      <div class="row g-4">
        <div class="col-md-4">
          <div class="info-box">
            <h6 class="text-white mb-4">Informasi Kuis</h6>
            <div class="info-item">
              <img src="../../Gambar/icon/matakuliah_putih.svg" alt="" />
              <div>
                <span>Mata Kuliah</span>
                <span>Layanan Web - Kuis 1</span>
              </div>
            </div>
            <div class="info-item">
              <img src="../../Gambar/icon/person_putih.svg" alt="" />
              <div>
                <span>Dosen</span>
                <span>Marcus Jackson S.Kom</span>
              </div>
            </div>
            <div class="info-item">
              <img src="../../Gambar/icon/waktu_putih.svg" alt="" />
              <div>
                <span>Waktu Pengerjaan</span>
                <span>1 Jam 50 Menit</span>
              </div>
            </div>
            <div class="info-item">
              <img src="../../Gambar/icon/jumlah_soal_putih.svg" alt="" />
              <div>
                <span>Jumlah Soal</span>
                <span>50 Soal</span>
              </div>
            </div>
          </div>

          <div class="question-box">
            <h6>Daftar Soal</h6>
            <div class="number-grid">
              <button class="number-btn">1</button>
              <button class="number-btn">2</button>
              <button class="number-btn">3</button>
              <button class="number-btn">4</button>
              <button class="number-btn">5</button>
              <button class="number-btn">6</button>
              <button class="number-btn">7</button>
              <button class="number-btn">8</button>
              <button class="number-btn">9</button>
              <button class="number-btn">10</button>
              <!-- ... add buttons 11-25 ... -->
            </div>
          </div>
        </div>

        <div class="col-md-8">
          <div class="quiz-content">
            <p>
              Lorem ipsum dolor sit amet consectetur. Tellus aenean sit mauris
              urna egestas cursus placerat.
            </p>

            <div class="answer-grid">
              <button class="answer-option">
                A. Lorem ipsum dolor sit amet
              </button>
              <button class="answer-option">
                B. Lorem ipsum dolor sit amet
              </button>
              <button class="answer-option">
                C. Lorem ipsum dolor sit amet
              </button>
              <button class="answer-option">
                D. Lorem ipsum dolor sit amet
              </button>
            </div>

            <div class="nav-buttons">
              <button class="btn-nav btn-prev">Sebelumnya</button>
              <button class="btn-nav btn-next">Selanjutnya</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
