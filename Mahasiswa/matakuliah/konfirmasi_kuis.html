<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mahasiswa - Konfirmasi Kuis</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jwt-decode@4.0.0/build/jwt-decode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-cookie/1.4.1/jquery.cookie.min.js"></script>
    <style>
      body {
        background-color: #f1f5f9;
        font-family: "Segoe UI", sans-serif;
        margin: 0;
      }
      .container-flex {
        display: flex;
        min-height: 100vh;
      }

      .sidebar {
        background-color: #1d2d44;
        color: white;
        height: 100vh;
        width: 250px;
        border-right: 2px solid #e2e8f0;
        transition: width 0.3s ease;
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 1rem;
      }

      .sidebar.collapsed {
        width: 80px;
      }

      .sidebar .nav-link {
        color: #f1f4f5;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 10px;
        transition: all 0.3s ease;
        padding: 0.5rem 0.75rem;
        border-radius: 8px;
      }

      .sidebar .nav-link:hover {
        background-color: #334155;
        color: white;
      }

      .sidebar .nav-link span {
        transition: opacity 0.3s ease;
      }

      .sidebar.collapsed .nav-link span,
      .sidebar.collapsed .logout-text,
      .sidebar.collapsed .logo-title,
      .sidebar.collapsed .profile-info {
        display: none !important;
      }

      .sidebar.collapsed .nav-link {
        justify-content: center;
      }

      .sidebar.collapsed .logout-btn {
        width: auto;
        padding: 0.5rem;
        justify-content: center;
      }

      .active {
        background-color: #334155;
        color: #fff;
        border-radius: 10px;
      }

      .line-icon {
        width: 100%;
        margin: 10px 0;
      }

      .profile-img {
        width: 40px;
        height: 40px;
        object-fit: cover;
        border-radius: 50%;
      }

      .logout-btn {
        background-color: #f1f4f5;
        color: #1d2d44;
        border-radius: 5px;
        width: 100%;
        transition: width 0.3s ease;
        border: none;
        padding: 0.5rem 1rem;
        font-weight: 600;
        cursor: pointer;
      }

      .logout-btn:hover {
        background-color: #e2e8f0;
      }

      .sidebar-icon {
        width: 18px;
        height: 18px;
      }

      .logo-geser {
        width: 15px;
        cursor: pointer;
        transition: transform 0.3s ease;
      }

      .logo-title {
        font-size: 1.25rem;
        transition: opacity 0.3s ease;
        margin: 0;
      }

      .logo-wrap {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .main-content {
        flex-grow: 1;
        padding: 40px 60px;
        background-color: #f1f5f9;
      }
      .kembali {
        color: #1d2d44;
      }

      .content-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 2rem;
      }

      .search-container {
        margin-bottom: 0;
      }

      .search-input {
        width: 240px;
        padding: 8px 16px;
        border-radius: 10px;
        border: 1px solid #e2e8f0;
        font-size: 14px;
        background-color: white;
      }

      .search-input::placeholder {
        color: #94a3b8;
      }

      .content-header h2 {
        font-size: 24px;
        color: #1d2d44;
      }

      /* Quiz List Styles */
      .quiz-list {
        display: flex;
        flex-direction: column;
        gap: 16px;
        padding: 24px;
        background: white;
        border-radius: 16px;
        box-shadow: 0 5px 8px rgba(5, 5, 5, 5.5);
      }

      .quiz-list-item {
        background: white;
        border-radius: 10px;
        padding: 10px 15px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border: 1px solid #e2e8f0;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
      }

      .quiz-list-item:hover {
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
      }

      .quiz-list-thumbnail {
        width: 48px;
        height: 48px;
        border-radius: 8px;
        object-fit: cover;
      }

      .quiz-list-info {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .quiz-info h5 {
        font-size: 15px;
        color: #1e293b;
        margin: 0;
      }

      .quiz-info p {
        font-size: 12px;
        color: #64748b;
        margin: 0;
      }

      .btn-dark {
        background: #1d2d44;
        border: none;
        padding: 8px 16px;
        font-size: 14px;
        border-radius: 6px;
      }

      .btn-dark:hover {
        background: #2a3e50;
      }

      /* Modal/Popup Styles */
      .quiz-modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        z-index: 1000;
        justify-content: center;
        align-items: center;
      }

      .modal-content {
        background: white;
        border-radius: 16px;
        width: 100%;
        max-width: 400px;
        padding: 24px;
      }

      .modal-header {
        margin-bottom: 24px;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .modal-header h4 {
        font-size: 20px;
        color: #1d2d44;
        margin: 0;
      }

      .modal-warning-icon {
        width: 48px;
        height: 48px;
        margin-bottom: 16px;
      }

      .modal-quiz-info {
        background: #f8fafc;
        border-radius: 12px;
        padding: 20px;
        display: flex;
        justify-content: space-around;
        margin-bottom: 24px;
        border: 3px solid #1d2d44;
      }

      .modal-info-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 8px;
        border: none;
      }

      .modal-info-icon {
        width: 32px;
        height: 32px;
      }

      .confirmation-text {
        text-align: center;
        color: #1d2d44;
        margin-bottom: 24px;
      }

      .button-group {
        display: flex;
        gap: 12px;
      }

      .button-group button {
        flex: 1;
        padding: 10px;
      }

      .btn-light {
        background: white;
        border: 1px solid #e2e8f0;
      }

      .btn-light:hover {
        background: #f8fafc;
      }
    </style>
  </head>
  <body>
    <div class="d-flex">
      <div id="sidebar-container"></div>
      <!-- Main Content -->
      <div class="main-content">
        <a
          href="matakuliah.html"
          class="kembali d-block mb-3 text-decoration-none"
          >&larr; Kembali</a
        >
        <div class="content-header mb-4">
          <div class="d-flex align-items-center gap-2">
            <div>
              <h2 class="mb-0" id="courseName"></h2>
              <p class="text-muted mb-0" id="lecturerName"></p>
            </div>
          </div>
          <div class="search-container">
            <input type="search" class="search-input" placeholder="Search" />
          </div>
        </div>

        <!-- Main Quiz List -->
        <div class="quiz-list" id="quizList"></div>

        <!-- Modal/Popup -->
        <div class="quiz-modal" id="quizModal">
          <div class="modal-content">
            <div class="modal-header">
              <img
                src="../../Gambar/icon/warning.svg"
                alt="warning"
                class="modal-warning-icon"
              />
              <h4 id="modalQuizTitle">Judul Kuis</h4>
            </div>
            <div class="modal-body">
              <div class="modal-quiz-info">
                <div class="modal-info-item">
                  <img
                    src="../../Gambar/icon/waktu.svg"
                    alt="time"
                    class="modal-info-icon"
                  />
                  <div>
                    <label>Waktu Pengerjaan</label>
                    <p id="modalQuizTime">0 Menit</p>
                  </div>
                </div>
                <div class="modal-info-item">
                  <img
                    src="../../Gambar/icon/jumlah_soal.svg"
                    alt="questions"
                    class="modal-info-icon"
                  />
                  <div>
                    <label>Jumlah Soal</label>
                    <p id="modalQuizQuestions">0</p>
                  </div>
                </div>
              </div>
              <p class="confirmation-text">Apakah kamu yakin?</p>
              <div class="button-group">
                <button class="btn btn-light" onclick="closeModal()">
                  Batal
                </button>
                <button id="modalStartButton" class="btn btn-dark">
                  Mulai
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="../../Admin/assets/custom.js"></script>
    <!-- Sidebar Geser Script -->
    <script>
      function muatDataApi() {
        const queryString = window.location.search;
        const params = new URLSearchParams(queryString);

        const courseName = params.get("courseName");
        if (courseName === "" || courseName === null) {
          alert("matakuliah tidak ditemukan");
          window.location = "matakuliah.html";
        }

        const body = document.getElementById("quizList");
        return $.ajax({
          url: `${API_URL}/api-student/quizzes/course/${courseName}`,
          type: "GET",
          xhrFields: {
            withCredentials: true,
          },
          success: function (response) {
            if (response.data === null) {
              alert("Belum ada quiz");
              window.location = "matakuliah.html";
            }

            document.getElementById("courseName").innerHTML =
              response.data[0].course_name;
            document.getElementById(
              "lecturerName"
            ).innerHTML = `Dosen : ${toTitleCase(
              response.data[0].lecturer_name
            )}`;

            response.data.forEach((item) => {
              console.log(item);

              const timeLimit = item.duration || "N/A";
              const questionCount = item.question_count || "N/A";
              const quizId = item.id;

              const content = `
              <div class="quiz-list-item shadow-sm">
                <div class="d-flex align-items-center gap-3">
                  <img
                    src="../../Gambar/icon/konfirnasi_kuis.png"
                    alt="quiz"
                    class="quiz-list-thumbnail"
                  />
                  <div class="quiz-list-info">
                    <h6>${item.course_name} - ${item.question_name}</h6>
                    <p>Deadline: ${formatDate(item.deadline)}</p>
                  </div>
                </div>
                
                <button 
                  class="btn btn-dark" 
                  onclick="showModal(this)"
                  data-title="${item.course_name} - ${item.question_name}"
                  data-time="${timeLimit}"
                  data-questions="${questionCount}"
                  data-quiz-id="${quizId}"
                >
                  Mulai Kuis
                </button>
              </div>`;

              body.innerHTML += content;
            });
          },
          error: function (xhr) {
            if (xhr.status === 401) {
              refreshAccessToken(muatDataApi);
            } else if (xhr.status === 400) {
              window.location.href = "/index.html";
            }

            console.error("Error memuat data:", xhr);
          },
        });
      }

      document.addEventListener("DOMContentLoaded", function () {
        fetch("../sidebar.html")
          .then((response) => response.text())
          .then((data) => {
            document.getElementById("sidebar-container").innerHTML = data;

            // Sidebar geser
            const geserBtn = document.getElementById("geserSidebar");
            const sidebar = document.querySelector(".sidebar");

            if (geserBtn && sidebar) {
              let isCollapsed = false;
              geserBtn.addEventListener("click", () => {
                sidebar.classList.toggle("collapsed");
                isCollapsed = !isCollapsed;

                geserBtn.src = isCollapsed
                  ? "../../Gambar/icon/panah_kanan.svg"
                  : "../../Gambar/icon/panah_kiri.svg";
              });
            }

            // Set active state untuk menu Bank Soal
            const navLinks = document.querySelectorAll(".nav-link");
            navLinks.forEach((link) => {
              // Cek apakah link menuju ke bank_soal.html
              if (link.getAttribute("href").includes("matakuliah.html")) {
                link.classList.add("active");
              } else {
                link.classList.remove("active");
              }
            });

            const token = $.cookie("token");
            let dataToken = decodeJWT(token);
            if (dataToken.role != "mahasiswa") {
              window.location.href = "http://127.0.0.1:5500/index.html";
            }
          });
      });

      muatDataApi();

      function showModal(buttonElement) {
        const title = buttonElement.getAttribute("data-title");
        const time = buttonElement.getAttribute("data-time");
        const questions = buttonElement.getAttribute("data-questions");
        const quizId = buttonElement.getAttribute("data-quiz-id");

        document.getElementById("modalQuizTitle").textContent = title;
        document.getElementById("modalQuizTime").textContent = `${time} Menit`;
        document.getElementById("modalQuizQuestions").textContent = questions;

        const modalStartButton = document.getElementById("modalStartButton");
        modalStartButton.onclick = function () {
          startQuiz(quizId);
        };

        document.getElementById("quizModal").style.display = "flex";
      }

      function closeModal() {
        document.getElementById("quizModal").style.display = "none";
      }

      function startQuiz(quizId) {
        if (!quizId) {
          alert("ID Kuis tidak ditemukan!");
          return;
        }
        console.log("Memulai kuis dengan ID:", quizId);
        window.location.href = `soal_kuis.html?quiz_id=${quizId}`;
      }
    </script>
  </body>
</html>
