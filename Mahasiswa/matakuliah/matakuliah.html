<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mahasiswa - Pengaturan</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jwt-decode@4.0.0/build/jwt-decode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-cookie/1.4.1/jquery.cookie.min.js"></script>
    <style>
      body {
        background-color: #f1f5f9;
        font-family: "Segoe UI", sans-serif;
        margin: 0;
      }
      .container-flex {
        display: flex;
        min-height: 100vh;
      }

      .sidebar {
        background-color: #1d2d44;
        color: white;
        min-height: 100vh;
        width: 250px;
        border-right: 2px solid #e2e8f0;
        transition: width 0.3s ease;
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 1rem;
      }

      .sidebar.collapsed {
        width: 80px;
      }

      .sidebar .nav-link {
        color: #f1f4f5;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 10px;
        transition: all 0.3s ease;
        padding: 0.5rem 0.75rem;
        border-radius: 8px;
      }

      .sidebar .nav-link:hover {
        background-color: #334155;
        color: white;
      }

      .sidebar .nav-link span {
        transition: opacity 0.3s ease;
      }

      .sidebar.collapsed .nav-link span,
      .sidebar.collapsed .logout-text,
      .sidebar.collapsed .logo-title,
      .sidebar.collapsed .profile-info {
        display: none !important;
      }

      .sidebar.collapsed .nav-link {
        justify-content: center;
      }

      .sidebar.collapsed .logout-btn {
        width: auto;
        padding: 0.5rem;
        justify-content: center;
      }

      .active {
        background-color: #334155;
        color: #fff;
        border-radius: 10px;
      }

      .line-icon {
        width: 100%;
        margin: 10px 0;
      }

      .profile-img {
        width: 40px;
        height: 40px;
        object-fit: cover;
        border-radius: 50%;
      }

      .logout-btn {
        background-color: #f1f4f5;
        color: #1d2d44;
        border-radius: 5px;
        width: 100%;
        transition: width 0.3s ease;
        border: none;
        padding: 0.5rem 1rem;
        font-weight: 600;
        cursor: pointer;
      }

      .logout-btn:hover {
        background-color: #e2e8f0;
      }

      .sidebar-icon {
        width: 18px;
        height: 18px;
      }

      .logo-geser {
        width: 15px;
        cursor: pointer;
        transition: transform 0.3s ease;
      }

      .logo-title {
        font-size: 1.25rem;
        transition: opacity 0.3s ease;
        margin: 0;
      }

      .logo-wrap {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .main-content {
        flex-grow: 1;
        padding: 40px 60px;
        background-color: #f1f5f9;
      }

      .content-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 2rem;
      }

      .search-container {
        margin-bottom: 0;
      }

      .search-input {
        width: 180px;
        padding: 6px 14px;
        border-radius: 10px;
        border: 1px solid #e2e8f0;
        font-size: 14px;
        background-color: white;
      }

      .search-input::placeholder {
        color: #94a3b8;
      }

      .course-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 24px;
        padding: 1rem;
      }

      .course-card {
        height: 280px;
        padding: 32px;
        border-radius: 24px;
        text-decoration: none;
        transition: transform 0.2s ease;
        display: flex;
        align-items: flex-start;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        position: relative;
      }

      .card-title {
        position: absolute;
        top: 32px;
        left: 20px;
        font-size: 24px;
        color: white;
        margin: 0;
        line-height: 1.2;
        max-width: 80%;
      }

      /* Updated styles for the last card */
      /* .course-card:last-child {
        grid-column: 1 / 2;
        margin-top: 24px;
      } */

      /* Updated color styles with slightly lighter shades */
      .course-card.pink {
        background-color: #ec4899;
      }

      .course-card.purple {
        background-color: #8b5cf6;
      }

      .course-card.orange {
        background-color: #f59e0b;
      }

      .course-card.green {
        background-color: #22c55e;
      }
    </style>
  </head>
  <body>
    <div class="d-flex">
      <div id="sidebar-container"></div>
      <!-- Main Content -->
      <div class="main-content">
        <div class="content-header mb-4">
          <div>
            <h2>Daftar Mata Kuliah</h2>
            <p class="text-muted">Daftar matakuliah</p>
          </div>
        </div>

        <div class="course-grid" id="content"></div>
      </div>
    </div>

    <script src="../../Admin/assets/custom.js"></script>
    <!-- Sidebar Geser Script -->
    <script>
      function muatDataApi() {
        return $.ajax({
          url: `${API_URL}/api-student/courses-by-user`,
          type: "GET",
          xhrFields: {
            withCredentials: true,
          },
          success: function (response) {
            const colors = ["pink", "purple", "orange", "green"];
            const body = document.getElementById("content");
            response.data.forEach((item) => {
              const randomColor =
                colors[Math.floor(Math.random() * colors.length)];
              content = `<a href="konfirmasi_kuis.html?courseName=${item.course_code}" class="course-card ${randomColor}">
                <h3 class="card-title">${item.name}</h3>
              </a>`;
              body.innerHTML += content;
            });
            console.log(response.data);
          },
          error: function (xhr) {
            if (xhr.status === 401) {
              refreshAccessToken(muatDataApi);
            } else if (xhr.status === 400) {
              window.location.href = "/index.html";
            }

            console.error("Error memuat data:", xhr);
          },
        });
      }

      document.addEventListener("DOMContentLoaded", function () {
        fetch("../sidebar.html")
          .then((response) => response.text())
          .then((data) => {
            document.getElementById("sidebar-container").innerHTML = data;

            // Sidebar geser
            const geserBtn = document.getElementById("geserSidebar");
            const sidebar = document.querySelector(".sidebar");

            if (geserBtn && sidebar) {
              let isCollapsed = false;
              geserBtn.addEventListener("click", () => {
                sidebar.classList.toggle("collapsed");
                isCollapsed = !isCollapsed;

                geserBtn.src = isCollapsed
                  ? "../../Gambar/icon/panah_kanan.svg"
                  : "../../Gambar/icon/panah_kiri.svg";
              });
            }

            // active sidebar
            const currentPath = window.location.pathname.split("/").pop();
            const navLinks = document.querySelectorAll(".nav-link");

            navLinks.forEach((link) => {
              const linkPath = link.getAttribute("href").split("/").pop();

              if (currentPath === linkPath) {
                link.classList.add("active");
              } else {
                link.classList.remove("active");
              }
            });

            const token = $.cookie("token");
            let dataToken = decodeJWT(token);
            if (dataToken.role != "mahasiswa") {
              window.location.href = "http://127.0.0.1:5500/index.html";
            }
          });
        muatDataApi();
      });
    </script>
  </body>
</html>
