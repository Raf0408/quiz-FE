<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Statistik Kuis</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jwt-decode@4.0.0/build/jwt-decode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-cookie/1.4.1/jquery.cookie.min.js"></script>
    <style>
      body {
        font-family: "Poppins", sans-serif;
        background-color: #f1f4f5;
        color: #3e5c76;
      }

      .container-custom {
        max-width: 768px;
        margin: 0 auto;
      }

      .progress-circles {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        border: 6px solid #3e5c76;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .progress-circles .percentage {
        font-weight: 600;
        font-size: 18px;
      }

      .box-card {
        flex: 1 1 0;
        max-width: 300px;
        background-color: #3e5c76;
        border: 1px solid #f1f4f5;
        border-radius: 14px;
        padding: 12px 30px;
        text-align: center;
        color: #fff;
      }

      .statistik-box {
        background-color: #1d2d44;
        border-radius: 14px;
        padding: 20px;
        color: #fff;
      }

      .statistik-jawaban {
        background-color: #1e293b;
        border-radius: 16px;
        padding: 24px;
      }

      .jawaban-container {
        max-height: 400px; /* Set fixed height for 4 items */
        overflow-y: auto; /* Enable vertical scrolling */
        margin-bottom: 16px;
        padding-right: 8px; /* Add space for scrollbar */
      }

      /* Custom scrollbar styling */
      .jawaban-container::-webkit-scrollbar {
        width: 6px;
      }

      .jawaban-container::-webkit-scrollbar-track {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 4px;
      }

      .jawaban-container::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.2);
        border-radius: 4px;
      }

      .jawaban-container::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.3);
      }

      .jawaban {
        background: rgba(71, 85, 105, 0.4);
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 16px;
        margin-bottom: 12px;
      }

      .wrapper {
        width: 32px;
        height: 32px;
        background-color: rgba(255, 255, 255, 0.1);
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 14px;
        color: white;
        margin-top: 2px;
      }

      .jawaban-anda {
        color: #f87171;
        font-size: 14px;
        margin-top: 4px;
      }

      .jawaban-benar2 {
        color: #4ade80;
        font-size: 14px;
        margin-top: 2px;
      }

      .error-icon {
        background: #f87171;
        width: 32px;
        height: 32px;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        margin-left: auto;
      }
    </style>
  </head>
  <body>
    <div class="container py-4 container-custom">
      <div class="d-flex flex-column align-items-center gap-4">
        <!-- Greeting Section -->
        <div class="d-flex flex-column align-items-center gap-2 text-center">
          <div class="progress-circles">
            <div class="percentage" id="score">50%</div>
          </div>
          <div>
            <h4 class="fw-semibold">Selamat!</h4>
            <p class="mb-0 small" id="scoreText"></p>
          </div>
        </div>

        <!-- Statistik Kuis -->
        <div class="statistik-box w-100">
          <h5 class="text-center fw-semibold mb-3">Statistik Kuis</h5>
          <div class="d-flex justify-content-center gap-3 flex-wrap">
            <div class="box-card">
              <div class="fw-semibold small">Total Soal</div>
              <b id="totalQuestion"></b>
            </div>
            <div class="box-card">
              <div class="fw-semibold small">Jawaban Benar</div>
              <b id="totalCorrect"></b>
            </div>
            <div class="box-card">
              <div class="fw-semibold small">Jawaban Salah</div>
              <b id="totalIncorrect"></b>
            </div>
          </div>
        </div>

        <!-- Statistik Jawaban -->
        <div class="statistik-jawaban w-100">
          <h5 class="text-center fw-semibold text-white mb-4">
            Statistik Jawaban
          </h5>

          <div class="jawaban-container" id="jawaban"></div>
        </div>

        <!-- Tombol Kembali -->
        <div class="w-100 text-center">
          <a
            href="hasil_kuis.html"
            class="btn btn-dark px-3 py-2 rounded-3 w-100"
            style="background-color: #1d2d44"
          >
            Kembali
          </a>
        </div>
      </div>
    </div>

    <script src="../../Admin/assets/custom.js"></script>
    <script>
      function muatDataApi() {
        const queryString = window.location.search;
        const params = new URLSearchParams(queryString);
        const quizResult = params.get("quizResult");

        return $.ajax({
          url: `${API_URL}/api-student/quizzes/${quizResult}/result`,
          type: "GET",
          xhrFields: {
            withCredentials: true,
          },
          success: function (response) {
            document.getElementById(
              "score"
            ).innerHTML = `${response.data.score}%`;
            document.getElementById("totalQuestion").innerHTML =
              response.data.question_count;
            document.getElementById("totalCorrect").innerHTML =
              response.data.count_correct_answer;
            document.getElementById("totalIncorrect").innerHTML =
              response.data.count_incorrect_answer;
            document.getElementById("scoreText").innerHTML = `
            Anda telah menyelesaikan kuis dengan skor ${response.data.score} dari ${response.data.question_count} pertanyaan`;

            const body = document.getElementById("jawaban");
            if (response.data.incorrect_answer_detail !== null) {
              response.data.incorrect_answer_detail.forEach((item) => {
                const content = `
                <div class="d-flex flex-column gap-3">
                  <div class="jawaban">
                    <div class="d-flex gap-3">
                      <div class="flex-grow-1">
                        <div class="text-white mb-2">
                        ${toTitleCase(item.question_text)}
                        </div>
                        <div class="jawaban-anda">
                          Jawaban Anda : ${toTitleCase(item.incorrect_answer)}
                        </div>
                        <div class="jawaban-benar2">
                          Jawaban Benar : ${toTitleCase(item.correct_answer)}
                        </div>
                      </div>
                      <div class="error-icon">
                        <img
                          src="../../Gambar/icon/close.svg"
                          alt="wrong"
                          width="20"
                          height="20"
                        />
                      </div>
                    </div>
                  </div>
                </div>
                `;

                body.innerHTML += content;
              });
            }
          },
          error: function (xhr) {
            if (xhr.status === 401) {
              refreshAccessToken(muatDataApi);
            } else if (xhr.status === 400) {
              window.location.href = "/index.html";
            }

            console.error("Error memuat data:", xhr);
          },
        });
      }

      document.addEventListener("DOMContentLoaded", function () {
        muatDataApi();
      });
    </script>
  </body>
</html>
