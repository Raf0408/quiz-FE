<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mahasiswa - Hasil Kuis</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jwt-decode@4.0.0/build/jwt-decode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-cookie/1.4.1/jquery.cookie.min.js"></script>
    <style>
      /* Styles dipertahankan seperti semula */
      body {
        background-color: #f1f5f9;
        font-family: "Segoe UI", sans-serif;
        margin: 0;
      }
      .container-flex {
        display: flex;
        min-height: 100vh;
      }

      .sidebar {
        background-color: #1d2d44;
        color: white;
        height: 100vh;
        width: 250px;
        border-right: 2px solid #e2e8f0;
        transition: width 0.3s ease;
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 1rem;
      }

      .sidebar.collapsed {
        width: 80px;
      }

      .sidebar .nav-link {
        color: #f1f4f5;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 10px;
        transition: all 0.3s ease;
        padding: 0.5rem 0.75rem;
        border-radius: 8px;
      }

      .sidebar .nav-link:hover {
        background-color: #334155;
        color: white;
      }

      .sidebar .nav-link span {
        transition: opacity 0.3s ease;
      }

      .sidebar.collapsed .nav-link span,
      .sidebar.collapsed .logout-text,
      .sidebar.collapsed .logo-title,
      .sidebar.collapsed .profile-info {
        display: none !important;
      }

      .sidebar.collapsed .nav-link {
        justify-content: center;
      }

      .sidebar.collapsed .logout-btn {
        width: auto;
        padding: 0.5rem;
        justify-content: center;
      }

      .active {
        background-color: #334155;
        color: #fff;
        border-radius: 10px;
      }

      .line-icon {
        width: 100%;
        margin: 10px 0;
      }

      .profile-img {
        width: 40px;
        height: 40px;
        object-fit: cover;
        border-radius: 50%;
      }

      .logout-btn {
        background-color: #f1f4f5;
        color: #1d2d44;
        border-radius: 5px;
        width: 100%;
        transition: width 0.3s ease;
        border: none;
        padding: 0.5rem 1rem;
        font-weight: 600;
        cursor: pointer;
      }

      .logout-btn:hover {
        background-color: #e2e8f0;
      }

      .sidebar-icon {
        width: 18px;
        height: 18px;
      }

      .logo-geser {
        width: 15px;
        cursor: pointer;
        transition: transform 0.3s ease;
      }

      .logo-title {
        font-size: 1.25rem;
        transition: opacity 0.3s ease;
        margin: 0;
      }

      .logo-wrap {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .main-content {
        flex-grow: 1;
        padding: 40px;
        background-color: #f1f5f9;
      }
      .custom-btn {
        background-color: #1e2a3a;
        color: white;
        border: none;
        border-radius: 10px;
        padding: 10px 20px;
      }
      .custom-btn:hover {
        background-color: #2a3e50;
      }

      .table th {
        font-weight: 600;
        color: #1d2d44;
        padding: 1rem;
      }

      .table td {
        padding: 1rem;
        color: #1d2d44;
      }

      .badge {
        font-weight: 500;
        padding: 6px 12px;
      }

      .btn-dark {
        background-color: #1d2d44;
        border: none;
      }

      .btn-dark:hover {
        background-color: #2a3e50;
      }

      .card {
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1) !important;
      }

      .btn-light {
        background: white;
        border-color: #e2e8f0;
        padding: 8px 16px;
      }

      .btn-light:hover {
        background-color: #f8fafc;
        border-color: #cbd5e1;
      }

      .dropdown-toggle::after {
        margin-left: 10px;
      }

      .search-box .form-control {
        border-radius: 8px;
        padding: 8px 16px;
        width: 250px;
        border: 1px solid #e2e8f0;
      }

      .search-box .form-control:focus {
        border-color: #cbd5e1;
        box-shadow: none;
      }

      /* Memperbaiki tampilan badge status */
      .badge.rounded-pill {
        padding: 6px 12px;
        font-weight: 500;
      }

      /* Memperbaiki tampilan tombol lihat hasil */
      .btn-dark {
        padding: 6px 16px;
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <!-- Sidebar akan dimuat di sini -->
    <div class="container-flex">
      <!-- Sidebar -->
      <div id="sidebar-container"></div>

      <!-- Main Content -->
      <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <div>
            <h2>Hasil kuis</h2>
            <p class="text-muted">Daftar hasil kuis dari seluruh mata kuliah</p>
          </div>
        </div>

        <!-- Tambahkan bagian filter dan search -->
        <div class="d-flex justify-content-between align-items-center mb-4">
          <div class="dropdown">
            <button
              class="btn btn-light dropdown-toggle border"
              type="button"
              id="dropdownMatakuliah"
              data-bs-toggle="dropdown"
              aria-expanded="false"
            >
              Pilih Mata Kuliah
            </button>
            <ul class="dropdown-menu" aria-labelledby="dropdownMatakuliah">
              <li><a class="dropdown-item" href="#">Layanan Web</a></li>
              <li><a class="dropdown-item" href="#">Database</a></li>
              <li><a class="dropdown-item" href="#">Frontend</a></li>
            </ul>
          </div>
          <div class="search-box">
            <input type="text" class="form-control" placeholder="Search" />
          </div>
        </div>

        <div class="card border-0 shadow-sm">
          <div class="card-body p-0">
            <div class="table-responsive">
              <table class="table table-hover align-middle mb-0">
                <thead class="bg-light">
                  <tr>
                    <th>Quiz</th>
                    <th>Matakuliah</th>
                    <th>Tanggal</th>
                    <th>Nilai</th>
                    <th>Status</th>
                    <th>Action</th>
                  </tr>
                </thead>
                <tbody id="content"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>

      <script src="../../Admin/assets/custom.js"></script>
      <!-- Script Load Sidebar -->
      <script>
        function muatDataApi() {
          return $.ajax({
            url: `${API_URL}/api-student/quizzes/history`,
            type: "GET",
            xhrFields: {
              withCredentials: true,
            },
            success: function (response) {
              const body = document.getElementById("content");
              response.data.forEach((item) => {
                const content = `
                <tr>
                  <td>${item.quiz_name}</td>
                  <td>${item.course_name}</td>
                  <td>${item.created_at}</td>
                  <td>${item.score}% (${item.score}/100)</td>
                  <td>
                    <span class="badge rounded-pill" style="
                      background-color: ${
                        item.status === "lulus" ? "#e6f4ea" : "#fce8e8"
                      };
                      color: ${item.status === "lulus" ? "#1e8e3e" : "#d93025"};
                    ">
                      ${item.status === "lulus" ? "Lulus" : "Gagal"}
                    </span>  
                  </td>
                  <td>
                    <button
                      class="btn btn-dark btn-sm"
                      onclick="lihatHasil(${item.id})"
                    >
                      Lihat hasil
                    </button>
                  </td>
                </tr>`;

                body.innerHTML += content;
              });
              console.log(response.data);
            },
            error: function (xhr) {
              if (xhr.status === 401) {
                refreshAccessToken(muatDataApi);
              } else if (xhr.status === 400) {
                window.location.href = "/index.html";
              }

              console.error("Error memuat data:", xhr);
            },
          });
        }

        document.addEventListener("DOMContentLoaded", function () {
          fetch("../sidebar.html")
            .then((response) => response.text())
            .then((data) => {
              document.getElementById("sidebar-container").innerHTML = data;

              // Sidebar geser
              const geserBtn = document.getElementById("geserSidebar");
              const sidebar = document.querySelector(".sidebar");

              if (geserBtn && sidebar) {
                let isCollapsed = false;
                geserBtn.addEventListener("click", () => {
                  sidebar.classList.toggle("collapsed");
                  isCollapsed = !isCollapsed;

                  geserBtn.src = isCollapsed
                    ? "../../Gambar/icon/panah_kanan.svg"
                    : "../../Gambar/icon/panah_kiri.svg";
                });
              }

              // active sidebar
              const currentPath = window.location.pathname.split("/").pop();
              const navLinks = document.querySelectorAll(".nav-link");

              navLinks.forEach((link) => {
                const linkPath = link.getAttribute("href").split("/").pop();

                if (currentPath === linkPath) {
                  link.classList.add("active");
                } else {
                  link.classList.remove("active");
                }
              });

              const token = $.cookie("token");
              let dataToken = decodeJWT(token);
              if (dataToken.role != "mahasiswa") {
                window.location.href = "http://127.0.0.1:5500/index.html";
              }
            });

          muatDataApi();
        });
      </script>
    </div>

    <!-- Tambahkan Bootstrap JS untuk dropdown -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      // Tambahkan setelah script yang sudah ada
      function lihatHasil(quizResultId) {
        // Redirect ke halaman lihat hasil
        window.location.href = `lihat_hasil.html?quizResult=${quizResultId}`;
      }
    </script>
  </body>
</html>
