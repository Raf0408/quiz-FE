<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin - Pengaturan</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jwt-decode@4.0.0/build/jwt-decode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-cookie/1.4.1/jquery.cookie.min.js"></script>
    <style>
      body {
        background-color: #f1f5f9;
        font-family: "Segoe UI", sans-serif;
        margin: 0;
      }
      .container-flex {
        display: flex;
        min-height: 100vh;
      }

      .sidebar {
        background-color: #1d2d44;
        color: white;
        height: 100vh;
        width: 250px;
        border-right: 2px solid #e2e8f0;
        transition: width 0.3s ease;
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 1rem;
      }

      .sidebar.collapsed {
        width: 80px;
      }

      .sidebar .nav-link {
        color: #f1f4f5;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 10px;
        transition: all 0.3s ease;
        padding: 0.5rem 0.75rem;
        border-radius: 8px;
      }

      .sidebar .nav-link:hover {
        background-color: #334155;
        color: white;
      }

      .sidebar .nav-link span {
        transition: opacity 0.3s ease;
      }

      .sidebar.collapsed .nav-link span,
      .sidebar.collapsed .logout-text,
      .sidebar.collapsed .logo-title,
      .sidebar.collapsed .profile-info {
        display: none !important;
      }

      .sidebar.collapsed .nav-link {
        justify-content: center;
      }

      .sidebar.collapsed .logout-btn {
        width: auto;
        padding: 0.5rem;
        justify-content: center;
      }

      .active {
        background-color: #334155;
        color: #fff;
        border-radius: 10px;
      }

      .line-icon {
        width: 100%;
        margin: 10px 0;
      }

      .profile-img {
        width: 40px;
        height: 40px;
        object-fit: cover;
        border-radius: 50%;
      }

      .logout-btn {
        background-color: #f1f4f5;
        color: #1d2d44;
        border-radius: 5px;
        width: 100%;
        transition: width 0.3s ease;
        border: none;
        padding: 0.5rem 1rem;
        font-weight: 600;
        cursor: pointer;
      }

      .logout-btn:hover {
        background-color: #e2e8f0;
      }

      .sidebar-icon {
        width: 18px;
        height: 18px;
      }

      .logo-geser {
        width: 15px;
        cursor: pointer;
        transition: transform 0.3s ease;
      }

      .logo-title {
        font-size: 1.25rem;
        transition: opacity 0.3s ease;
        margin: 0;
      }

      .logo-wrap {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .main-content {
        flex-grow: 1;
        padding: 40px;
        background-color: #f1f5f9;
      }
      .pengaturan-parent {
        align-self: stretch;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        justify-content: flex-start;
        gap: 15px;
      }
      .ubah-foto-profil {
        align-self: stretch;
        position: relative;
      }
      .drag-atau-masukan {
        flex: 1;
        position: relative;
      }
      .drag-atau-masukan-foto-disini-wrapper {
        align-self: stretch;
        border-radius: 8px;
        border: 1px solid #b1acac;
        box-sizing: border-box;
        height: 225px;
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: center;
        padding: 10px;
        text-align: center;
        color: #919191;
        cursor: pointer;
      }
      .ubah-foto-profil-parent {
        align-self: stretch;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        justify-content: flex-start;
        gap: 10px;
      }
      .masukan-password-baru-wrapper {
        align-self: stretch;
        border-radius: 8px;
        border: 1px solid #b1acac;
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: center;
        padding: 10px;
        color: #919191;
      }
      .custom-btn {
        background-color: #1e2a3a;
        color: white;
        border: none;
        border-radius: 10px;
        padding: 10px 20px;
        font-weight: bold;
      }
      .custom-btn:hover {
        background-color: #2a3e50;
      }
      .frame-group {
        max-width: 800px;
        width: 100%;
        margin: 0 auto;
        box-shadow: -34px 69px 22px rgba(141, 139, 139, 0),
          -22px 44px 20px rgba(0, 0, 0, 0.01),
          -12px 25px 17px rgba(0, 0, 0, 0.05),
          -5px 11px 12px rgba(0, 0, 0, 0.09), -1px 3px 7px rgba(0, 0, 0, 0.1);
        border-radius: 14px;
        background-color: #fff;
        border: 1px solid #b1acac;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        padding: 25px;
        gap: 70px;
        font-size: 15px;
      }
    </style>
  </head>
  <body>
    <div class="d-flex">
      <div class="sidebar d-flex flex-column justify-content-between p-3">
        <div>
          <!-- Logo -->
          <div class="d-flex align-items-center justify-content-between mb-4">
            <div class="d-flex align-items-center gap-2 logo-wrap">
              <h5 class="logo-title mb-0">Quizku.</h5>
            </div>
            <img
              src="../../Gambar/icon/panah_kiri.svg"
              alt="geser"
              class="logo-geser"
              id="geserSidebar"
            />
          </div>

          <!-- Menu -->
          <nav class="nav flex-column">
            <a href="../dashboard/dashboard.html" class="nav-link">
              <img
                src="../../Gambar/icon/dashboard.svg"
                class="sidebar-icon active"
                alt="Dashboard"
              />
              <span>Dashboard</span>
            </a>
            <a href="../kelola_pengguna/kelola_pengguna.html" class="nav-link">
              <img
                src="../../Gambar/icon/kelola_pengguna.svg"
                class="sidebar-icon"
                alt="Kelola Pengguna"
              />
              <span>Kelola Pengguna</span>
            </a>
            <a href="../Bank Soal/bank_soal.html" class="nav-link">
              <img
                src="../../Gambar/icon/bank_soal.svg"
                class="sidebar-icon"
                alt="Bank Soal"
              />
              <span>Bank Soal</span>
            </a>
            <a href="../History Quis/history_kuis.html" class="nav-link">
              <img
                src="../../Gambar/icon/history_quiz.svg"
                class="sidebar-icon"
                alt="Histori Quiz"
              />
              <span>Histori Quiz</span>
            </a>
            <a href="../Matakuliah/matakuliah.html" class="nav-link">
              <img
                src="../../Gambar/icon/matakuliah.svg"
                class="sidebar-icon"
                alt="Matakuliah"
              />
              <span>Matakuliah</span>
            </a>
            <a href="../Dosen/dosen.html" class="nav-link">
              <img
                src="../../Gambar/icon/dosen.svg"
                class="sidebar-icon"
                alt="Dosen"
              />
              <span>Dosen</span>
            </a>
            <a href="../Mahasiswa/mahasiswa.html" class="nav-link">
              <img
                src="../../Gambar/icon/mahasiswa.svg"
                class="sidebar-icon"
                alt="Mahasiswa"
              />
              <span>Mahasiswa</span>
            </a>
            <a href="../Kelas/kelas.html" class="nav-link">
              <img
                src="../../Gambar/icon/kelas.svg"
                class="sidebar-icon"
                alt="Kelas"
              />
              <span>Kelas</span>
            </a>
            <a href="../Pengaturan/pengaturan.html" class="nav-link active">
              <img
                src="../../Gambar/icon/pengaturan.svg"
                class="sidebar-icon"
                alt="Pengaturan"
              />
              <span>Pengaturan</span>
            </a>
          </nav>
        </div>
        <div>
          <!-- Garis -->
          <img
            class="line-icon"
            alt="line"
            src="../../Gambar/icon/Line 5.svg"
          />

          <!-- Profile -->
          <div class="d-flex align-items-center mb-2">
            <img id="profile-image" alt="profile" class="profile-img me-2" />
            <div class="profile-info">
              <strong id="profile-name"></strong><br />
              <small id="profile-email"></small>
            </div>
          </div>
          <button
            class="btn logout-btn d-flex align-items-center justify-content-center"
            onclick="logout()"
          >
            <img
              src="../../Gambar/icon/Logout.svg"
              class="me-2"
              style="width: 18px"
              alt="Logout"
            />
            <span class="logout-text">Logout</span>
          </button>
        </div>
      </div>

      <!-- Main Content -->
      <div class="flex-grow-1 p-4 main-content">
        <div class="mb-4">
          <h2>Pengaturan</h2>
          <p class="text-muted">Menu Pengaturan</p>
          <form id="formEdit">
            <div class="frame-group">
              <div class="pengaturan-parent">
                <div class="ubah-foto-profil-parent">
                  <b class="ubah-foto-profil">Ubah foto profil</b>
                  <label
                    for="gambar"
                    class="drag-atau-masukan-foto-disini-wrapper"
                  >
                    <input
                      type="file"
                      name="gambar"
                      id="gambar"
                      accept="image/*"
                      hidden
                    />
                    <div class="drag-atau-masukan" id="previewText">
                      Drag atau Masukan foto disini
                    </div>
                  </label>
                </div>

                <div class="ubah-foto-profil-parent">
                  <b class="ubah-foto-profil">Ubah password</b>
                  <div class="masukan-password-baru-wrapper">
                    <input
                      type="password"
                      name="passwordBaru"
                      id="password"
                      class="form-control border-0"
                      placeholder="Masukkan password baru"
                      style="outline: none; box-shadow: none"
                    />
                  </div>
                </div>
              </div>
              <button class="custom-btn w-100" type="submit">Simpan</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="../assets/custom.js"></script>
    <script>
      $("#formEdit").submit(function (e) {
        e.preventDefault();

        const token = $.cookie("token");
        const data = decodeJWT(token);
        const password = $("#password").val();
        const gambarInput = $("#gambar")[0];

        const formData = new FormData();
        formData.append("email", data.email);
        formData.append("name", data.name);
        formData.append("password", password);
        if (gambarInput && gambarInput.files && gambarInput.files.length > 0) {
          formData.append("image", gambarInput.files[0]);
        }

        function updateUserData() {
          $.ajax({
            url: `${API_URL}/api/update-user`,
            type: "PUT",
            xhrFields: {
              withCredentials: true,
            },
            data: formData,
            processData: false,
            contentType: false,
            success: function (response) {
              console.log("Update berhasil!", response);
              alert("Update berhasil");
              window.location.href = "pengaturan.html";
            },
            error: function (xhr, status, error) {
              if (xhr.status === 401) {
                refreshAccessToken(updateUserData);
              } else if (xhr.status === 400) {
                window.location.href = "pengaturan.html";
              }
              alert("Update gagal");
            },
          });
        }

        updateUserData();
      });

      document.addEventListener("DOMContentLoaded", function () {
        const token = $.cookie("token");
        const data = decodeJWT(token);

        if (data.role != "admin") {
          window.location.href = "http://127.0.0.1:5500/index.html";
        }

        // Preview gambar atau nama file
        const gambarInput = document.getElementById("gambar");
        const previewText = document.getElementById("previewText");

        gambarInput.addEventListener("change", function () {
          const file = this.files[0];
          if (file) {
            if (file.type.startsWith("image/")) {
              const reader = new FileReader();
              reader.onload = function (e) {
                previewText.innerHTML = `<img src="${e.target.result}" alt="Preview" style="max-width: 200px; border-radius: 4px;" />`;
              };
              reader.readAsDataURL(file);
            } else {
              previewText.textContent = file.name;
            }
          } else {
            previewText.textContent = "Drag atau Masukan foto disini";
          }
        });
      });
    </script>
  </body>
</html>
