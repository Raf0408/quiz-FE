<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin - History Quiz</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #f1f5f9;
        font-family: "Segoe UI", sans-serif;
        margin: 0;
      }
      .container-flex {
        display: flex;
        min-height: 100vh;
      }

      .sidebar {
        background-color: #1d2d44;
        color: white;
        height: 100vh;
        width: 250px;
        border-right: 2px solid #e2e8f0;
        transition: width 0.3s ease;
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 1rem;
      }

      .sidebar.collapsed {
        width: 80px;
      }

      .sidebar .nav-link {
        color: #f1f4f5;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 10px;
        transition: all 0.3s ease;
        padding: 0.5rem 0.75rem;
        border-radius: 8px;
      }

      .sidebar .nav-link:hover {
        background-color: #334155;
        color: white;
      }

      .sidebar .nav-link span {
        transition: opacity 0.3s ease;
      }

      .sidebar.collapsed .nav-link span,
      .sidebar.collapsed .logout-text,
      .sidebar.collapsed .logo-title,
      .sidebar.collapsed .profile-info {
        display: none !important;
      }

      .sidebar.collapsed .nav-link {
        justify-content: center;
      }

      .sidebar.collapsed .logout-btn {
        width: auto;
        padding: 0.5rem;
        justify-content: center;
      }

      .active {
        background-color: #334155;
        color: #fff;
        border-radius: 10px;
      }

      .line-icon {
        width: 100%;
        margin: 10px 0;
      }

      .profile-img {
        width: 40px;
        height: 40px;
        object-fit: cover;
        border-radius: 50%;
      }

      .logout-btn {
        background-color: #f1f4f5;
        color: #1d2d44;
        border-radius: 5px;
        width: 100%;
        transition: width 0.3s ease;
        border: none;
        padding: 0.5rem 1rem;
        font-weight: 600;
        cursor: pointer;
      }

      .logout-btn:hover {
        background-color: #e2e8f0;
      }

      .sidebar-icon {
        width: 18px;
        height: 18px;
      }

      .logo-geser {
        width: 15px;
        cursor: pointer;
        transition: transform 0.3s ease;
      }

      .logo-title {
        font-size: 1.25rem;
        transition: opacity 0.3s ease;
        margin: 0;
      }

      .logo-wrap {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      /* Main content mengambil sisa ruang */
      .main-content {
        flex-grow: 1;
        padding: 40px;
        background-color: #f1f5f9;
      }
      .pengaturan-parent {
        align-self: stretch;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        justify-content: flex-start;
        gap: 15px;
      }
      .ubah-foto-profil {
        align-self: stretch;
        position: relative;
      }
      .drag-atau-masukan {
        flex: 1;
        position: relative;
      }
      .drag-atau-masukan-foto-disini-wrapper {
        align-self: stretch;
        border-radius: 8px;
        border: 1px solid #000;
        box-sizing: border-box;
        height: 225px;
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: center;
        padding: 10px;
        text-align: center;
        color: #919191;
      }
      .ubah-foto-profil-parent {
        align-self: stretch;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        justify-content: flex-start;
        gap: 10px;
      }
      .masukan-password-baru-wrapper {
        align-self: stretch;
        border-radius: 8px;
        border: 1px solid #000;
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: center;
        padding: 10px;
        color: #919191;
      }
      .simpan {
        position: relative;
        font-weight: 600;
      }
      .button-create {
        align-self: stretch;
        border-radius: 6px;
        background-color: #1d2d44;
        height: 57px;
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: center;
        padding: 10px;
        box-sizing: border-box;
        cursor: pointer;
        font-size: 16px;
        color: #fff;
      }
      .frame-group {
        width: 1192px;
        box-shadow: -34px 69px 22px rgba(0, 0, 0, 0),
          -22px 44px 20px rgba(0, 0, 0, 0.01),
          -12px 25px 17px rgba(0, 0, 0, 0.05),
          -5px 11px 12px rgba(0, 0, 0, 0.09), -1px 3px 7px rgba(0, 0, 0, 0.1);
        border-radius: 14px;
        background-color: #fff;
        border: 1px solid #000;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        padding: 25px;
        gap: 70px;
        font-size: 15px;
      }
      .frame-parent {
        align-self: stretch;
        flex: 1;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        padding: 25px 30px;
        gap: 210px;
        font-size: 40px;
        color: #1d2d44;
      }
      .admin-pengaturan {
        width: 100%;
        position: relative;
        background-color: #f1f4f5;
        height: 1117px;
        overflow: hidden;
        display: flex;
        flex-direction: row;
        align-items: flex-start;
        justify-content: flex-start;
        gap: 1px;
        text-align: left;
        font-size: 15px;
        color: #f1f4f5;
        font-family: Poppins;
      }
    </style>
  </head>
  <body>
    <div class="d-flex">

      <div class="sidebar d-flex flex-column justify-content-between p-3">
        <div>

            </div>
            <img
              src="../../Gambar/icon/panah_kiri.svg"

          </div>

          <!-- Menu -->
          <nav class="nav flex-column">
            <a href="../dashboard/dashboard.html" class="nav-link">
              <img
                src="../../Gambar/icon/dashboard.svg"
                class="sidebar-icon active"

              />
              <span>Dashboard</span>
            </a>
            <a href="../kelola_pengguna/kelola_pengguna.html" class="nav-link">
              <img
                src="../../Gambar/icon/kelola_pengguna.svg"
                class="sidebar-icon"
                alt="Kelola Pengguna"
              />
              <span>Kelola Pengguna</span>
            </a>
            <a href="../Bank Soal/bank_soal.html" class="nav-link">
              <img
                src="../../Gambar/icon/bank_soal.svg"
                class="sidebar-icon"
                alt="Bank Soal"
              />
              <span>Bank Soal</span>
            </a>
            <a href="../History Quis/history_kuis.html" class="nav-link">
              <img
                src="../../Gambar/icon/history_quiz.svg"
                class="sidebar-icon"
                alt="Histori Quiz"
              />
              <span>Histori Quiz</span>
            </a>
            <a href="../Matakuliah/matakuliah.html" class="nav-link">
              <img
                src="../../Gambar/icon/matakuliah.svg"
                class="sidebar-icon"
                alt="Matakuliah"
              />
              <span>Matakuliah</span>
            </a>
            <a href="../Dosen/dosen.html" class="nav-link">
              <img
                src="../../Gambar/icon/dosen.svg"
                class="sidebar-icon"
                alt="Dosen"
              />
              <span>Dosen</span>
            </a>
            <a href="../Mahasiswa/mahasiswa.html" class="nav-link">
              <img
                src="../../Gambar/icon/mahasiswa.svg"
                class="sidebar-icon"
                alt="Mahasiswa"
              />
              <span>Mahasiswa</span>
            </a>
            <a href="../Kelas/kelas.html" class="nav-link">
              <img
                src="../../Gambar/icon/kelas.svg"
                class="sidebar-icon"
                alt="Kelas"
              />
              <span>Kelas</span>
            </a>
            <a href="../Pengaturan/pengaturan.html" class="nav-link active">
              <img
                src="../../Gambar/icon/pengaturan.svg"
                class="sidebar-icon"
                alt="Pengaturan"
              />
              <span>Pengaturan</span>
            </a>
          </nav>
        </div>
        <div>
          <!-- Garis -->
          <img
            class="line-icon"
            alt="line"
            src="../../Gambar/icon/Line 5.svg"
          />

          <!-- Profile -->
          <div class="d-flex align-items-center mb-2">
            <img src="Ellipse 8.png" alt="profile" class="profile-img me-2" />
            <div class="profile-info">
              <strong>Dominick</strong><br />
              <small>dominick@gmail.com</small>
            </div>
          </div>
          <button
            class="btn logout-btn d-flex align-items-center justify-content-center"
          >
            <img
              src="../../Gambar/icon/Logout.svg"
              class="me-2"
              style="width: 18px"
              alt="Logout"
            />
            <span class="logout-text">Logout</span>
          </button>
        </div>
      </div>

      <!-- Main Content -->
      <div class="flex-grow-1 p-4 main-content">
        <div class="mb-4">
          <h2>Pengaturan</h2>
          <p class="text-muted">
            Yuk, kita lihat sekilas tentang sistem aplikasi kuis kamu
          </p>
          <div class="frame-group">
            <div class="pengaturan-parent">
              <div class="ubah-foto-profil-parent">
                <b class="ubah-foto-profil">Ubah foto profil</b>
                <div class="drag-atau-masukan-foto-disini-wrapper">
                  <div class="drag-atau-masukan">
                    Drag atau Masukan foto disini
                  </div>
                </div>
              </div>
              <div class="ubah-foto-profil-parent">
                <b class="ubah-foto-profil">Ubah password</b>
                <div class="masukan-password-baru-wrapper">
                  <div class="drag-atau-masukan">Masukan password baru</div>
                </div>
              </div>
            </div>
            <div class="button-create" id="buttonCreateContainer">
              <div class="simpan">Simpan</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Sidebar Geser Script -->
    <script>
      const geserBtn = document.getElementById("geserSidebar");
      const sidebar = document.querySelector(".sidebar");

      let isCollapsed = false;

      geserBtn.addEventListener("click", () => {
        sidebar.classList.toggle("collapsed");
        isCollapsed = !isCollapsed;

        geserBtn.src = isCollapsed
          ? "../../Gambar/icon/panah_kanan.svg"
          : "../../Gambar/icon/panah_kiri.svg";
      });
    </script>
  </body>
</html>
