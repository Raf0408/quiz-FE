<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Kelola Pengguna</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jwt-decode@4.0.0/build/jwt-decode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-cookie/1.4.1/jquery.cookie.min.js"></script>
    <style>
      body {
        background-color: #f1f5f9;
        font-family: "Segoe UI", sans-serif;
        margin: 0;
      }
      .container-flex {
        display: flex;
        min-height: 100vh;
      }

      .sidebar {
        background-color: #1d2d44;
        color: white;
        min-height: 150vh;
        width: 250px;
        border-right: 2px solid #e2e8f0;
        transition: width 0.3s ease;
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
      }

      .sidebar > div:first-of-type {
        display: flex;
        flex-direction: column;
        flex-grow: 1;
        overflow: hidden;
        min-height: 0;
      }

      .sidebar
        > div:first-of-type
        > .d-flex.align-items-center.justify-content-between {
        flex-shrink: 0;
      }

      .sidebar .nav.flex-column {
        flex-grow: 1;
        overflow-y: auto;
      }

      .sidebar > div:last-of-type {
        flex-shrink: 0;
      }

      .sidebar.collapsed {
        width: 80px;
      }

      .sidebar .nav-link {
        color: #f1f4f5;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 10px;
        transition: all 0.3s ease;
        padding: 0.5rem 0.75rem;
        border-radius: 8px;
      }

      .sidebar .nav-link:hover {
        background-color: #334155;
        color: white;
      }

      .sidebar .nav-link span {
        transition: opacity 0.3s ease;
      }

      .sidebar.collapsed .nav-link span,
      .sidebar.collapsed .logout-text,
      .sidebar.collapsed .logo-title,
      .sidebar.collapsed .profile-info {
        display: none !important;
      }

      .sidebar.collapsed .nav-link {
        justify-content: center;
      }

      .sidebar.collapsed .logout-btn {
        width: auto;
        padding: 0.5rem;
        justify-content: center;
      }

      .active {
        background-color: #334155;
        color: #fff;
        border-radius: 10px;
      }

      .line-icon {
        width: 100%;
        margin: 10px 0;
      }

      .profile-img {
        width: 40px;
        height: 40px;
        object-fit: cover;
        border-radius: 50%;
      }

      .logout-btn {
        background-color: #f1f4f5;
        color: #1d2d44;
        border-radius: 5px;
        width: 100%;
        transition: width 0.3s ease;
        border: none;
        padding: 0.5rem 1rem;
        font-weight: 600;
        cursor: pointer;
      }

      .logout-btn:hover {
        background-color: #e2e8f0;
      }

      .sidebar-icon {
        width: 18px;
        height: 18px;
      }

      .logo-geser {
        width: 15px;
        cursor: pointer;
        transition: transform 0.3s ease;
      }

      .logo-title {
        font-size: 1.25rem;
        transition: opacity 0.3s ease;
        margin: 0;
      }

      .logo-wrap {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      /* Main content mengambil sisa ruang */
      .main-content {
        flex-grow: 1;
        padding: 40px;
        background-color: #f1f5f9;
      }
      .table-container {
        background: #fff;
        border-radius: 10px;
        padding: 20px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
        border: 1px solid #ced4da;
      }
      .custom-btn {
        background-color: #1e2a3a;
        color: white;
        border: none;
        border-radius: 10px;
        padding: 10px 20px;
        font-weight: bold;
      }
      .custom-btn:hover {
        background-color: #2a3e50;
      }
      .avatar {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        object-fit: cover;
        margin-right: 10px;
      }
      .action-icon {
        cursor: pointer;
        margin: 0 8px;
        font-size: 20px;
      }
      .action-icon img {
        width: 20px;
        height: 20px;
      }
      select#filterRole {
        width: 160px;
        padding: 8px 10px;
        border-radius: 8px;
        border: 1px solid #ccc;
        font-size: 16px;
      }
      .badge {
        background-color: #e2e8f0;
        color: #1e293b;
        font-size: 16px;
        padding: 6px 12px;
        border-radius: 10px;
      }
      .table th,
      .table td {
        font-size: 16px;
      }
    </style>
  </head>
  <body>
    <div class="d-flex">
      <div class="sidebar d-flex flex-column justify-content-between p-3">
        <div>
          <!-- Logo -->
          <div class="d-flex align-items-center justify-content-between mb-4">
            <div class="d-flex align-items-center gap-2 logo-wrap">
              <h5 class="logo-title mb-0">Quizku.</h5>
            </div>
            <img
              src="../../Gambar/icon/panah_kiri.svg"
              alt="geser"
              class="logo-geser"
              id="geserSidebar"
            />
          </div>

          <!-- Menu -->
          <nav class="nav flex-column">
            <a href="../dashboard/dashboard.html" class="nav-link">
              <img
                src="../../Gambar/icon/dashboard.svg"
                class="sidebar-icon active"
                alt="Dashboard"
              />
              <span>Dashboard</span>
            </a>
            <a
              href="../kelola_pengguna/kelola_pengguna.html"
              class="nav-link active"
            >
              <img
                src="../../Gambar/icon/kelola_pengguna.svg"
                class="sidebar-icon"
                alt="Kelola Pengguna"
              />
              <span>Kelola Pengguna</span>
            </a>
            <a href="../Bank Soal/bank_soal.html" class="nav-link">
              <img
                src="../../Gambar/icon/bank_soal.svg"
                class="sidebar-icon"
                alt="Bank Soal"
              />
              <span>Bank Soal</span>
            </a>
            <a href="../History Quis/history_kuis.html" class="nav-link">
              <img
                src="../../Gambar/icon/history_quiz.svg"
                class="sidebar-icon"
                alt="Histori Quiz"
              />
              <span>Histori Quiz</span>
            </a>
            <a href="../Matakuliah/matakuliah.html" class="nav-link">
              <img
                src="../../Gambar/icon/matakuliah.svg"
                class="sidebar-icon"
                alt="Matakuliah"
              />
              <span>Matakuliah</span>
            </a>
            <a href="../Dosen/dosen.html" class="nav-link">
              <img
                src="../../Gambar/icon/dosen.svg"
                class="sidebar-icon"
                alt="Dosen"
              />
              <span>Dosen</span>
            </a>
            <a href="../Mahasiswa/mahasiswa.html" class="nav-link">
              <img
                src="../../Gambar/icon/mahasiswa.svg"
                class="sidebar-icon"
                alt="Mahasiswa"
              />
              <span>Mahasiswa</span>
            </a>
            <a href="../Kelas/kelas.html" class="nav-link">
              <img
                src="../../Gambar/icon/kelas.svg"
                class="sidebar-icon"
                alt="Kelas"
              />
              <span>Kelas</span>
            </a>
            <a href="../Pengaturan/pengaturan.html" class="nav-link">
              <img
                src="../../Gambar/icon/pengaturan.svg"
                class="sidebar-icon"
                alt="Pengaturan"
              />
              <span>Pengaturan</span>
            </a>
          </nav>
        </div>
        <div>
          <!-- Garis -->
          <img
            class="line-icon"
            alt="line"
            src="../../Gambar/icon/Line 5.svg"
          />

          <!-- Profile -->
          <div class="d-flex align-items-center mb-2">
            <img id="profile-image" alt="profile" class="profile-img me-2" />
            <div class="profile-info">
              <strong id="profile-name"></strong><br />
              <small id="profile-email"></small>
            </div>
          </div>
          <button
            class="btn logout-btn d-flex align-items-center justify-content-center"
            onclick="logout()"
          >
            <img
              src="../../Gambar/icon/Logout.svg"
              class="me-2"
              style="width: 18px"
              alt="Logout"
            />
            <span class="logout-text">Logout</span>
          </button>
        </div>
      </div>

      <!-- Main Content -->
      <div class="main-content">
        <h2 class="fw-bold mb-2">Kelola Pengguna</h2>
        <p class="mb-4">
          Di sini kamu bisa membuat dan mengatur akun untuk Mahasiswa, Dosen,
          dan Admin.
        </p>

        <div class="d-flex justify-content-end mb-2">
          <a href="tambah_user.html" class="custom-btn text-decoration-none"
            >+ Tambah Pengguna</a
          >
        </div>

        <!-- Baris bawah: Search dan Filter -->
        <div class="d-flex justify-content-between align-items-center mb-4">
          <input
            type="text"
            class="form-control w-25"
            id="cari"
            placeholder="Search..."
          />
          <select id="filterRole">
            <option value="all">Semua Role</option>
            <option value="mahasiswa">Mahasiswa</option>
            <option value="dosen">Dosen</option>
            <option value="admin">Admin</option>
          </select>
        </div>

        <div class="table-container">
          <table class="table align-middle">
            <thead>
              <tr>
                <th>Pengguna</th>
                <th>Role</th>
                <th>Dibuat</th>
                <th>Aksi</th>
              </tr>
            </thead>
            <tbody id="daftarPengguna"></tbody>
          </table>
        </div>
      </div>
    </div>
    <script>
      const geserBtn = document.getElementById("geserSidebar");
      const sidebar = document.querySelector(".sidebar");

      let isCollapsed = false;

      geserBtn.addEventListener("click", () => {
        sidebar.classList.toggle("collapsed");
        isCollapsed = !isCollapsed;

        geserBtn.src = isCollapsed
          ? "../../Gambar/icon/panah_kanan.svg"
          : "../../Gambar/icon/panah_kiri.svg";
      });
    </script>
    <script src="../assets/custom.js"></script>
    <script>
      // Data pengguna disimpan pada variabel sesi, bukan localStorage
      let dataPengguna = [];

      // Fungsi untuk inisialisasi data sampel
      function inisialisasiDataSampel() {
        // Membuat beberapa data pengguna contoh
        return [
          {
            name: "John Doe",
            email: "john@example.com",
            role: "admin",
            created_at: new Date().toLocaleDateString("id-ID"),
          },
        ];
      }

      function muatDataApi() {
        return $.ajax({
          url: `${API_URL}/api-admin/users`,
          type: "GET",
          xhrFields: {
            withCredentials: true,
          },
          success: function (response) {
            dataPengguna = [];

            response["data"].forEach((element) => {
              dataPengguna.push(element);
            });

            sessionStorage.setItem(
              "dataPengguna",
              JSON.stringify(dataPengguna)
            );
          },

          error: function (xhr) {
            if (xhr.status === 401) {
              refreshAccessToken(muatDataApi);
            } else if (xhr.status === 400) {
              window.location.href = "/index.html";
            }
            console.error("Error memuat data:", xhr);
          },
        });
      }

      // Fungsi untuk memuat data pengguna dan menampilkan di tabel
      function muatDataPengguna() {
        const tbody = document.getElementById("daftarPengguna");
        const cari = document.getElementById("cari")?.value.toLowerCase() || "";
        const filterRole =
          document.getElementById("filterRole")?.value || "all";

        if (!tbody) return; // Pastikan elemen tbody ada

        tbody.innerHTML = "";

        dataPengguna.forEach((user, index) => {
          const matchRole = filterRole === "all" || user.role === filterRole;
          const matchSearch =
            user.name.toLowerCase().includes(cari) ||
            user.email.toLowerCase().includes(cari);

          if (matchRole && matchSearch) {
            const tr = document.createElement("tr");

            tr.innerHTML = `
              <td class="d-flex align-items-center">
                  <img src="${API_URL}/assets/image/${user.image}" class="avatar" alt="Pengguna">
                  <div>
                      <div class="fw-semibold">${user.name}</div>
                      <div class="text-muted small">${user.email}</div>
                  </div>
              </td>
              <td><span class="badge text-capitalize">${user.role}</span></td>
              <td>${user.created_at}</td>
              <td>
                  <a href="edit_user.html?user-email=${user.email}" class="text-decoration-none">
                    <span class="action-icon edit" onclick="editPengguna(${index})">
                      <img src="../../Gambar/icon/edit.svg" alt="edit">
                    </span>
                  </a>  
                  <span class="action-icon delete" onclick="hapusPengguna(${index},${user.id})">
                    <img src="../../Gambar/icon/delete.svg" alt="delete">
                  </span>
              </td>
            `;
            tbody.appendChild(tr);
          }
        });
      }

      // Fungsi untuk menghapus pengguna
      function hapusPengguna(index, userId) {
        if (confirm("Yakin ingin menghapus pengguna ini?")) {
          $.ajax({
            url: `${API_URL}/api-admin/users/${userId}`,
            type: "DELETE",
            xhrFields: {
              withCredentials: true,
            },
            success: function (response) {
              dataPengguna.splice(index, 1);
              muatDataPengguna();
            },

            error: function (xhr) {
              if (xhr.status === 401) {
                refreshAccessToken(hapusPengguna);
              } else if (xhr.status === 400) {
                window.location.href = "kelola_pengguna.html";
              }
              console.error("Error memuat data:", xhr);
            },
          });
        }
      }

      // Inisialisasi event listener saat halaman dimuat
      document.addEventListener("DOMContentLoaded", function () {
        muatDataApi()
          .then(function () {
            const dataFromSession = sessionStorage.getItem("dataPengguna");
            if (dataFromSession) {
              dataPengguna = JSON.parse(dataFromSession);
            } else {
              // Jika tidak ada data, gunakan data sampel
              dataPengguna = inisialisasiDataSampel();
              // Simpan ke sessionStorage untuk navigasi antar halaman
              sessionStorage.setItem(
                "dataPengguna",
                JSON.stringify(dataPengguna)
              );
            }

            // Filter dan pencarian di halaman index
            document
              .getElementById("filterRole")
              ?.addEventListener("change", muatDataPengguna);
            document
              .getElementById("cari")
              ?.addEventListener("input", muatDataPengguna);

            // Form tambah pengguna
            document
              .getElementById("formTambahPengguna")
              ?.addEventListener("submit", tambahPengguna);

            // Form edit pengguna
            document
              .getElementById("formEditPengguna")
              ?.addEventListener("submit", updatePengguna);

            // Jika berada di halaman edit, load data untuk edit
            if (window.location.href.includes("edit_user.html")) {
              loadEditForm();
            }

            // Load data pengguna jika berada di halaman index
            if (document.getElementById("daftarPengguna")) {
              muatDataPengguna();
            }
          })
          .catch(function (error) {
            console.error("Terjadi kesalahan saat memuat data API:", error);
          });

        const token = $.cookie("token");
        let data = decodeJWT(token);
        if (data.role != "admin") {
          window.location.href = "http://127.0.0.1:5500/index.html";
        }
      });
    </script>
  </body>
</html>
