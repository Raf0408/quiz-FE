<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Edit Pengguna</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Poppins", sans-serif;
        background-color: #f1f5f9;
      }

      .sidebar {
        background-color: #1d2d44;
        color: white;
        height: 100vh;
        width: 250px;
        border-right: 2px solid #e2e8f0;
        transition: width 0.3s ease;
        flex-shrink: 0;
      }

      .sidebar.collapsed {
        width: 80px;
      }

      .sidebar .nav-link {
        color: #f1f4f5;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 10px;
        transition: all 0.3s ease;
      }

      .sidebar .nav-link span {
        transition: opacity 0.3s ease;
      }

      .sidebar.collapsed .nav-link span,
      .sidebar.collapsed .logout-text,
      .sidebar.collapsed .logo-title,
      .sidebar.collapsed .profile-info {
        display: none !important;
      }

      .sidebar.collapsed .nav-link {
        justify-content: center;
      }

      .sidebar.collapsed .logout-btn {
        width: auto;
        padding: 0.5rem;
        justify-content: center;
      }

      .active {
        background-color: #334155;
        color: #fff;
        border-radius: 10px;
      }
      .line-icon {
        width: 100%;
        margin: 10px 0;
      }

      .profile-img {
        width: 40px;
        height: 40px;
        object-fit: cover;
        border-radius: 50%;
      }

      .logout-btn {
        background-color: #f1f4f5;
        color: #1d2d44;
        border-radius: 5px;
        width: 100%;
        transition: width 0.3s ease;
      }

      .sidebar-icon {
        width: 18px;
        height: 18px;
      }

      .logo-geser {
        width: 15px;
        cursor: pointer;
        transition: transform 0.3s ease;
      }

      .logo-title {
        font-size: 1.25rem;
        transition: opacity 0.3s ease;
      }

      .logo-wrap img {
        height: 28px;
      }

      @media (max-width: 768px) {
        .sidebar {
          position: fixed;
          z-index: 1000;
          height: 100vh;
        }

        .main-content {
          margin-left: 250px;
          transition: margin-left 0.3s ease;
        }

        .sidebar.collapsed + .main-content {
          margin-left: 80px;
        }
      }

      .form-container {
        background: #fff;
        border-radius: 20px;
        padding: 40px;
        box-shadow: 0px 8px 20px rgba(0, 0, 0, 0.05);
        max-width: 8000px;
        margin: 0 auto;
        border: 1px solid #ced4da;
      }
      .kembali {
        color: #1e2a3a;
      }

      .custom-btn {
        background-color: #1e2a3a; 
        color: white; 
        border: none; 
        border-radius: 10px; 
        padding: 10px 20px; 
        font-weight: bold; 
      }
      .custom-btn:hover {
        background-color: #2a3e50;
      }
    </style>
  </head>
  <body>
    <div class="sidebar d-flex flex-column justify-content-between p-3">
      <div>
        <!-- Logo -->
        <div class="d-flex align-items-center justify-content-between mb-4">
          <div class="d-flex align-items-center gap-2 logo-wrap">
            <h5 class="logo-title mb-0">Quizku.</h5>
          </div>
          <img
            src="../../Gambar/icon/panah_kiri.svg"
            alt="geser"
            class="logo-geser"
            id="geserSidebar"
          />
        </div>

        <!-- Menu -->
        <nav class="nav flex-column">
          <a href="../dashboard/dashboard.html" class="nav-link active">
            <img
              src="../../Gambar/icon/dashboard.svg"
              class="sidebar-icon active"
              alt="Dashboard"
            />
            <span>Dashboard</span>
          </a>
          <a href="../kelola_pengguna/kelola_pengguna.html" class="nav-link">
            <img
              src="../../Gambar/icon/kelola_pengguna.svg"
              class="sidebar-icon"
              alt="Kelola Pengguna"
            />
            <span>Kelola Pengguna</span>
          </a>
          <a href="../Bank Soal/bank_soal.html" class="nav-link">
            <img
              src="../../Gambar/icon/bank_soal.svg"
              class="sidebar-icon"
              alt="Bank Soal"
            />
            <span>Bank Soal</span>
          </a>
          <a href="../History Quis/history_kuis.html" class="nav-link">
            <img
              src="../../Gambar/icon/history_quiz.svg"
              class="sidebar-icon"
              alt="Histori Quiz"
            />
            <span>Histori Quiz</span>
          </a>
          <a href="../Matakuliah/matakuliah.html" class="nav-link">
            <img
              src="../../Gambar/icon/matakuliah.svg"
              class="sidebar-icon"
              alt="Matakuliah"
            />
            <span>Matakuliah</span>
          </a>
          <a href="../Dosen/dosen.html" class="nav-link">
            <img
              src="../../Gambar/icon/dosen.svg"
              class="sidebar-icon"
              alt="Dosen"
            />
            <span>Dosen</span>
          </a>
          <a href="../Mahasiswa/mahasiswa.html" class="nav-link">
            <img
              src="../../Gambar/icon/mahasiswa.svg"
              class="sidebar-icon"
              alt="Mahasiswa"
            />
            <span>Mahasiswa</span>
          </a>
          <a href="../Kelas/kelas.html" class="nav-link">
            <img
              src="../../Gambar/icon/kelas.svg"
              class="sidebar-icon"
              alt="Kelas"
            />
            <span>Kelas</span>
          </a>
          <a href="../Pengaturan/pengaturan.html" class="nav-link">
            <img
              src="../../Gambar/icon/pengaturan.svg"
              class="sidebar-icon"
              alt="Pengaturan"
            />
            <span>Pengaturan</span>
          </a>
        </nav>
      </div>
      <div>
        <!-- Garis -->
        <img
          class="line-icon"
          alt="line"
          src="../../Gambar/icon/Line 5.svg"
        />

        <!-- Profile -->
        <div class="d-flex align-items-center mb-2">
          <img src="Ellipse 8.png" alt="profile" class="profile-img me-2" />
          <div class="profile-info">
            <strong>Dominick</strong><br />
            <small>dominick@gmail.com</small>
          </div>
        </div>
        <button
          class="btn logout-btn d-flex align-items-center justify-content-center"
        >
          <img
            src="../../Gambar/icon/Logout.svg"
            class="me-2"
            style="width: 18px"
            alt="Logout"
          />
          <span class="logout-text">Logout</span>
        </button>
      </div>
    </div>

    <div class="main-content">
      <a
        href="kelola_pengguna.html"
        class="kembali text-decoration-none mb-3 d-inline-block"
        >← Kembali</a
      >
      <h3 class="fw-bold mb-1">Edit User</h3>
      <p class="text-muted mb-4">
        Create and manage user accounts for students, lecturers, and
        administrators.
      </p>
        <div class="form-container">
          <form id="formEdit">
            <div class="mb-3">
              <label for="nama" class="form-label">Nama</label>
              <input type="text" class="form-control" id="nama" required />
            </div>
            <div class="mb-3">
              <label for="email" class="form-label">Email</label>
              <input type="email" class="form-control" id="email" required />
            </div>
            <div class="mb-3">
              <label for="role" class="form-label">Roles</label>
              <select id="role" class="form-select">
                <option value="mahasiswa">Mahasiswa</option>
                <option value="dosen">Dosen</option>
                <option value="admin">Admin</option>
              </select>
            </div>
            <div class="mb-4">
              <label for="password" class="form-label">Password</label>
              <input type="password" class="form-control" id="password" />
            </div>
            <button type="submit" class="custom-btn w-100">
              Simpan
            </button>
          </form>
        </div>
      </div>
    </div>

    <script>
      const pengguna = JSON.parse(localStorage.getItem("pengguna")) || [];
      const index = localStorage.getItem("editIndex");

      if (index === null) {
        alert("Data pengguna tidak ditemukan.");
        window.location.href = "kelola_pengguna.html";
      }

      const data = pengguna[index];
      document.getElementById("nama").value = data.nama;
      document.getElementById("email").value = data.email;
      document.getElementById("role").value = data.role;
      document.getElementById("password").value = data.password || "";

      document
        .getElementById("formEdit")
        .addEventListener("submit", function (e) {
          e.preventDefault();

          pengguna[index] = {
            nama: document.getElementById("nama").value,
            email: document.getElementById("email").value,
            role: document.getElementById("role").value,
            password: document.getElementById("password").value,
            created: data.created,
          };

          localStorage.setItem("pengguna", JSON.stringify(pengguna));
          localStorage.removeItem("editIndex");
          window.location.href = "kelola_pengguna.html";
        });
    </script>
  </body>
</html>
