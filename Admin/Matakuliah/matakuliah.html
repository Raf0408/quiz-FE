<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Kelola Mata Kuliah</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #f1f5f9;
        font-family: "Segoe UI", sans-serif;
        margin: 0;
      }
      .container-flex {
        display: flex;
        min-height: 100vh;
      }

      .sidebar {
        background-color: #1d2d44;
        color: white;
        height: 100vh;
        width: 250px;
        border-right: 2px solid #e2e8f0;
        transition: width 0.3s ease;
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 1rem;
      }

      .sidebar.collapsed {
        width: 80px;
      }

      .sidebar .nav-link {
        color: #f1f4f5;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 10px;
        transition: all 0.3s ease;
        padding: 0.5rem 0.75rem;
        border-radius: 8px;
      }

      .sidebar .nav-link:hover {
        background-color: #334155;
        color: white;
      }

      .sidebar .nav-link span {
        transition: opacity 0.3s ease;
      }

      .sidebar.collapsed .nav-link span,
      .sidebar.collapsed .logout-text,
      .sidebar.collapsed .logo-title,
      .sidebar.collapsed .profile-info {
        display: none !important;
      }

      .sidebar.collapsed .nav-link {
        justify-content: center;
      }

      .sidebar.collapsed .logout-btn {
        width: auto;
        padding: 0.5rem;
        justify-content: center;
      }

      .active {
        background-color: #334155;
        color: #fff;
        border-radius: 10px;
      }

      .line-icon {
        width: 100%;
        margin: 10px 0;
      }

      .profile-img {
        width: 40px;
        height: 40px;
        object-fit: cover;
        border-radius: 50%;
      }

      .logout-btn {
        background-color: #f1f4f5;
        color: #1d2d44;
        border-radius: 5px;
        width: 100%;
        transition: width 0.3s ease;
        border: none;
        padding: 0.5rem 1rem;
        font-weight: 600;
        cursor: pointer;
      }

      .logout-btn:hover {
        background-color: #e2e8f0;
      }

      .sidebar-icon {
        width: 18px;
        height: 18px;
      }

      .logo-geser {
        width: 15px;
        cursor: pointer;
        transition: transform 0.3s ease;
      }

      .logo-title {
        font-size: 1.25rem;
        transition: opacity 0.3s ease;
        margin: 0;
      }

      .logo-wrap {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      /* Main content mengambil sisa ruang */
      .main-content {
        flex-grow: 1;
        padding: 40px;
        background-color: #f1f5f9;
      }

      .table-container {
        background: #fff;
        border-radius: 10px;
        padding: 20px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
        border: 1px solid #ced4da;
      }

      .custom-btn {
        background-color: #1e293b;
        color: white;
        border: none;
        border-radius: 10px;
        padding: 10px 20px;
        font-weight: bold;
      }

      .custom-btn:hover {
        background-color: #334155;
      }

      .action-icon {
        cursor: pointer;
        margin: 0 8px;
        font-size: 18px;
      }

      .action-icon.edit {
        color: #0d6efd;
      }

      .action-icon.delete {
        color: #dc3545;
      }

      .search-box {
        max-width: 300px;
        margin-bottom: 15px;
      }

      .table th,
      .table td {
        vertical-align: middle;
        text-align: center;
      }

      .table thead th {
        background-color: #c9c9ca;
        color: rgb(48, 46, 46);
      }

      .form-control[disabled] {
        background-color: transparent;
        border: none;
        padding: 0;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="d-flex">
      <div class="sidebar d-flex flex-column justify-content-between p-3">
        <div>
          <!-- Logo -->
          <div class="d-flex align-items-center justify-content-between mb-4">
            <div class="d-flex align-items-center gap-2 logo-wrap">
              <h5 class="logo-title mb-0">Quizku.</h5>
            </div>
            <img
              src="../../Gambar/icon/panah_kiri.svg"
              alt="geser"
              class="logo-geser"
              id="geserSidebar"
            />
          </div>

          <!-- Menu -->
          <nav class="nav flex-column">
            <a href="../dashboard/dashboard.html" class="nav-link">
              <img
                src="../../Gambar/icon/dashboard.svg"
                class="sidebar-icon active"
                alt="Dashboard"
              />
              <span>Dashboard</span>
            </a>
            <a href="../kelola_pengguna/kelola_pengguna.html" class="nav-link">
              <img
                src="../../Gambar/icon/kelola_pengguna.svg"
                class="sidebar-icon"
                alt="Kelola Pengguna"
              />
              <span>Kelola Pengguna</span>
            </a>
            <a href="../Bank Soal/bank_soal.html" class="nav-link">
              <img
                src="../../Gambar/icon/bank_soal.svg"
                class="sidebar-icon"
                alt="Bank Soal"
              />
              <span>Bank Soal</span>
            </a>
            <a href="../History Quis/history_kuis.html" class="nav-link">
              <img
                src="../../Gambar/icon/history_quiz.svg"
                class="sidebar-icon"
                alt="Histori Quiz"
              />
              <span>Histori Quiz</span>
            </a>
            <a href="../Matakuliah/matakuliah.html" class="nav-link active">
              <img
                src="../../Gambar/icon/matakuliah.svg"
                class="sidebar-icon"
                alt="Matakuliah"
              />
              <span>Matakuliah</span>
            </a>
            <a href="../Dosen/dosen.html" class="nav-link">
              <img
                src="../../Gambar/icon/dosen.svg"
                class="sidebar-icon"
                alt="Dosen"
              />
              <span>Dosen</span>
            </a>
            <a href="../Mahasiswa/mahasiswa.html" class="nav-link">
              <img
                src="../../Gambar/icon/mahasiswa.svg"
                class="sidebar-icon"
                alt="Mahasiswa"
              />
              <span>Mahasiswa</span>
            </a>
            <a href="../Kelas/kelas.html" class="nav-link">
              <img
                src="../../Gambar/icon/kelas.svg"
                class="sidebar-icon"
                alt="Kelas"
              />
              <span>Kelas</span>
            </a>
            <a href="../Pengaturan/pengaturan.html" class="nav-link">
              <img
                src="../../Gambar/icon/pengaturan.svg"
                class="sidebar-icon"
                alt="Pengaturan"
              />
              <span>Pengaturan</span>
            </a>
          </nav>
        </div>
        <div>
          <!-- Garis -->
          <img
            class="line-icon"
            alt="line"
            src="../../Gambar/icon/Line 5.svg"
          />

          <!-- Profile -->
          <div class="d-flex align-items-center mb-2">
            <img src="Ellipse 8.png" alt="profile" class="profile-img me-2" />
            <div class="profile-info">
              <strong>Dominick</strong><br />
              <small>dominick@gmail.com</small>
            </div>
          </div>
          <button
            class="btn logout-btn d-flex align-items-center justify-content-center"
          >
            <img
              src="../../Gambar/icon/Logout.svg"
              class="me-2"
              style="width: 18px"
              alt="Logout"
            />
            <span class="logout-text">Logout</span>
          </button>
        </div>
      </div>

      <!-- Main Content -->
      <div class="main-content">
        <h2 class="fw-bold mb-2">Kelola Mata Kuliah</h2>
        <p class="mb-4">
          Create and manage user accounts for students, lecturers, and
          administrators.
        </p>
        <div class="d-flex justify-content-between align-items-center mb-3">
          <input
            type="text"
            id="searchBox"
            class="form-control search-box"
            placeholder=" Search"
            onkeyup="tampilkanData()"
          />
          <a
            href="tambah_matakuliah.html"
            class="custom-btn text-decoration-none"
            >+ Tambah Mata Kuliah</a
          >
        </div>

        <div class="table-container">
          <table class="table table-hover">
            <thead>
              <tr>
                <th>Kode Mata Kuliah</th>
                <th>Nama Mata Kuliah</th>
                <th>Aksi</th>
              </tr>
            </thead>
            <tbody id="tabelMatakuliah"></tbody>
          </table>
        </div>
      </div>
    </div>

    <script>
      const geserBtn = document.getElementById("geserSidebar");
      const sidebar = document.querySelector(".sidebar");

      let isCollapsed = false;

      geserBtn.addEventListener("click", () => {
        sidebar.classList.toggle("collapsed");
        isCollapsed = !isCollapsed;

        geserBtn.src = isCollapsed
          ? "../../Gambar/icon/panah_kanan.svg"
          : "../../Gambar/icon/panah_kiri.svg";
      });
    </script>
    <script>
      function tampilkanData() {
        const tbody = document.getElementById("tabelMatakuliah");
        const data = JSON.parse(localStorage.getItem("matakuliah")) || [];
        const keyword = document
          .getElementById("searchBox")
          .value.toLowerCase();

        tbody.innerHTML = "";

        data.forEach((mk, index) => {
          if (
            mk.kode.toLowerCase().includes(keyword) ||
            mk.nama.toLowerCase().includes(keyword)
          ) {
            const tr = document.createElement("tr");
            tr.innerHTML = `
            <td><input type="text" class="form-control" id="kode-${index}" value="${mk.kode}" disabled></td>
            <td><input type="text" class="form-control" id="nama-${index}" value="${mk.nama}" disabled></td>
            <td>
              <span class="action-icon edit" onclick="edit(${index})">&#9998;</span>
              <span class="action-icon delete" onclick="hapus(${index})">&#128465;</span>
              <button class="btn btn-success btn-sm d-none mt-1" id="simpan-${index}" onclick="simpan(${index})">Simpan</button>
            </td>
          `;
            tbody.appendChild(tr);
          }
        });
      }
      function edit(index) {
        localStorage.setItem("editIndex", index);
        window.location.href = "edit_matakuliah.html";
      }
      function hapus(index) {
        if (confirm("Apakah Anda yakin ingin menghapus data ini?")) {
          const data = JSON.parse(localStorage.getItem("matakuliah")) || [];
          data.splice(index, 1);
          localStorage.setItem("matakuliah", JSON.stringify(data));
          tampilkanData();
        }
      }

      window.onload = tampilkanData;
    </script>
  </body>
</html>
