<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Mahasiswa</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jwt-decode@4.0.0/build/jwt-decode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-cookie/1.4.1/jquery.cookie.min.js"></script>
    <style>
      body {
        background-color: #f1f5f9;
        font-family: "Segoe UI", sans-serif;
      }

      .container-flex {
        display: flex;
        min-height: 100vh;
      }

      .sidebar {
        background-color: #1d2d44;
        color: white;
        min-height: 150vh;
        width: 250px;
        border-right: 2px solid #e2e8f0;
        transition: width 0.3s ease;
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 1rem;
      }

      .sidebar.collapsed {
        width: 80px;
      }

      .sidebar .nav-link {
        color: #f1f4f5;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 10px;
        transition: all 0.3s ease;
        padding: 0.5rem 0.75rem;
        border-radius: 8px;
      }

      .sidebar .nav-link:hover {
        background-color: #334155;
        color: white;
      }

      .sidebar .nav-link span {
        transition: opacity 0.3s ease;
      }

      .sidebar.collapsed .nav-link span,
      .sidebar.collapsed .logout-text,
      .sidebar.collapsed .logo-title,
      .sidebar.collapsed .profile-info {
        display: none !important;
      }

      .sidebar.collapsed .nav-link {
        justify-content: center;
      }

      .sidebar.collapsed .logout-btn {
        width: auto;
        padding: 0.5rem;
        justify-content: center;
      }

      .active {
        background-color: #334155;
        color: #fff;
        border-radius: 10px;
      }

      .line-icon {
        width: 100%;
        margin: 10px 0;
      }

      .profile-img {
        width: 40px;
        height: 40px;
        object-fit: cover;
        border-radius: 50%;
      }

      .logout-btn {
        background-color: #f1f4f5;
        color: #1d2d44;
        border-radius: 5px;
        width: 100%;
        transition: width 0.3s ease;
        border: none;
        padding: 0.5rem 1rem;
        font-weight: 600;
        cursor: pointer;
      }

      .logout-btn:hover {
        background-color: #e2e8f0;
      }

      .sidebar-icon {
        width: 18px;
        height: 18px;
      }

      .logo-geser {
        width: 15px;
        cursor: pointer;
        transition: transform 0.3s ease;
      }

      .logo-title {
        font-size: 1.25rem;
        transition: opacity 0.3s ease;
        margin: 0;
      }

      .logo-wrap {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      /* Main content mengambil sisa ruang */
      .main-content {
        flex-grow: 1;
        padding: 40px;
        background-color: #f1f5f9;
      }

      .custom-btn {
        background-color: #1e293b;
        color: white;
        border: none;
        border-radius: 8px;
        padding: 10px;
        font-weight: bold;
      }

      .custom-btn:hover {
        background-color: #334155;
      }
    </style>
  </head>
  <body>
    <div class="container-flex">
      <div class="sidebar d-flex flex-column justify-content-between">
        <div>
          <!-- Logo dan toggle sidebar -->
          <div class="d-flex align-items-center justify-content-between mb-4">
            <div class="d-flex align-items-center gap-2 logo-wrap">
              <h5 class="logo-title mb-0">Quizku.</h5>
            </div>
            <img
              src="../../Gambar/icon/panah_kiri.svg"
              alt="geser"
              class="logo-geser"
              id="geserSidebar"
            />
          </div>

          <!-- Menu -->
          <nav class="nav flex-column">
            <a href="../dashboard/dashboard.html" class="nav-link">
              <img
                src="../../Gambar/icon/dashboard.svg"
                class="sidebar-icon active"
                alt="Dashboard"
              />
              <span>Dashboard</span>
            </a>
            <a href="../kelola_pengguna/kelola_pengguna.html" class="nav-link">
              <img
                src="../../Gambar/icon/kelola_pengguna.svg"
                class="sidebar-icon"
                alt="Kelola Pengguna"
              />
              <span>Kelola Pengguna</span>
            </a>
            <a href="../Bank Soal/bank_soal.html" class="nav-link">
              <img
                src="../../Gambar/icon/bank_soal.svg"
                class="sidebar-icon"
                alt="Bank Soal"
              />
              <span>Bank Soal</span>
            </a>
            <a href="../History Quis/history_kuis.html" class="nav-link">
              <img
                src="../../Gambar/icon/history_quiz.svg"
                class="sidebar-icon"
                alt="Histori Quiz"
              />
              <span>Histori Quiz</span>
            </a>
            <a href="../Matakuliah/matakuliah.html" class="nav-link">
              <img
                src="../../Gambar/icon/matakuliah.svg"
                class="sidebar-icon"
                alt="Matakuliah"
              />
              <span>Matakuliah</span>
            </a>
            <a href="../Dosen/dosen.html" class="nav-link">
              <img
                src="../../Gambar/icon/dosen.svg"
                class="sidebar-icon"
                alt="Dosen"
              />
              <span>Dosen</span>
            </a>
            <a href="../Mahasiswa/mahasiswa.html" class="nav-link active">
              <img
                src="../../Gambar/icon/mahasiswa.svg"
                class="sidebar-icon"
                alt="Mahasiswa"
              />
              <span>Mahasiswa</span>
            </a>
            <a href="../Kelas/kelas.html" class="nav-link">
              <img
                src="../../Gambar/icon/kelas.svg"
                class="sidebar-icon"
                alt="Kelas"
              />
              <span>Kelas</span>
            </a>
            <a href="../Pengaturan/pengaturan.html" class="nav-link">
              <img
                src="../../Gambar/icon/pengaturan.svg"
                class="sidebar-icon"
                alt="Pengaturan"
              />
              <span>Pengaturan</span>
            </a>
          </nav>
        </div>
        <div>
          <!-- Garis -->
          <img
            class="line-icon"
            alt="line"
            src="../../Gambar/icon/Line 5.svg"
          />

          <!-- Profile -->
          <div class="d-flex align-items-center mb-2">
            <img id="profile-image" alt="profile" class="profile-img me-2" />
            <div class="profile-info">
              <strong id="profile-name"></strong><br />
              <small id="profile-email"></small>
            </div>
          </div>
          <button
            class="btn logout-btn d-flex align-items-center justify-content-center"
            onclick="logout()"
          >
            <img
              src="../../Gambar/icon/Logout.svg"
              class="me-2"
              style="width: 18px"
              alt="Logout"
            />
            <span class="logout-text">Logout</span>
          </button>
        </div>
      </div>

      <div class="main-content">
        <h2 class="fw-bold mb-2">Mahasiwa</h2>
        <p class="mb-4">
          Create and manage user acounts for students, lecturers, and
          administrators.
        </p>
        <div class="card p-4 shadow-sm">
          <div class="mb-3">
            <label for="kelas" class="form-label">Kelas</label>
            <select
              id="kelas"
              name="kelas"
              class="form-select"
              required
            ></select>
          </div>

          <div class="mb-3">
            <label class="form-label">Mata Kuliah</label>
            <div id="listMatakuliah" class="form-check"></div>
          </div>

          <button class="custom-btn w-100" onclick="tambahData()">
            Simpan
          </button>
        </div>
      </div>
    </div>
    <script src="../assets/custom.js"></script>
    <script>
      const geserBtn = document.getElementById("geserSidebar");
      const sidebar = document.querySelector(".sidebar");

      let isCollapsed = false;

      geserBtn.addEventListener("click", () => {
        sidebar.classList.toggle("collapsed");
        isCollapsed = !isCollapsed;

        geserBtn.src = isCollapsed
          ? "../../Gambar/icon/panah_kanan.svg"
          : "../../Gambar/icon/panah_kiri.svg";
      });

      let dataKelas = [];
      let dataMatakuliah = [];
      let pilihMatakuliah = [];

      function muatDataKelas() {
        return $.ajax({
          url: `${API_URL}/api-admin/classes`,
          type: "GET",
          xhrFields: {
            withCredentials: true,
          },
          success: function (response) {
            dataKelas = [];
            response["data"].forEach((element) => {
              dataKelas.push(element);
            });
          },

          error: function (xhr) {
            if (xhr.status === 401) {
              refreshAccessToken(muatDosenMengajarApi);
            } else if (xhr.status === 400) {
              window.location.href = "/index.html";
            }

            console.error("Error memuat data:", xhr);
          },
        });
      }

      function muatDataMatakuliah() {
        return $.ajax({
          url: `${API_URL}/api-admin/courses`,
          type: "GET",
          xhrFields: {
            withCredentials: true,
          },
          success: function (response) {
            dataMatakuliah = [];
            response["data"].forEach((element) => {
              dataMatakuliah.push(element);
            });
          },

          error: function (xhr) {
            if (xhr.status === 401) {
              refreshAccessToken(muatDosenMengajarApi);
            } else if (xhr.status === 400) {
              window.location.href = "/index.html";
            }

            console.error("Error memuat data:", xhr);
          },
        });
      }

      function loadKelas() {
        const container = document.getElementById("kelas");
        const options = dataKelas
          .map((kls) => `<option value="${kls.id}">${kls.name}</option>`)
          .join("");
        container.innerHTML =
          `<option value="">- Pilih Kelas -</option>` + options;
      }

      function loadMatakuliah() {
        const container = document.getElementById("listMatakuliah");
        container.innerHTML = dataMatakuliah
          .map(
            (mk, i) => `
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" name="matkul" value="${mk.course_code}" id="matkul${i}">
                  <label class="form-check-label" for="matkul${i}">${mk.name}</label>
                </div>
              `
          )
          .join("");
      }

      function getSelectedCourses() {
        const selectedCheckboxes = document.querySelectorAll(
          'input[name="matkul"]:checked'
        );

        pilihMatakuliah = Array.from(selectedCheckboxes).map(
          (checkbox) => checkbox.value
        );
      }

      function tambahData() {
        const classId = $("#kelas").val();

        const ClassSubject = {
          class_id: parseInt(classId),
          course_code: pilihMatakuliah,
        };

        if (classId == "") {
          alert("Harap pilih kelas!");
          return;
        }

        if (pilihMatakuliah == null || pilihMatakuliah.length === 0) {
          alert("Harap pilih setidaknya satu opsi!");
          return;
        }

        $.ajax({
          url: `${API_URL}/api-admin/class-subject`,
          type: "POST",
          xhrFields: {
            withCredentials: true,
          },
          contentType: "application/json",
          data: JSON.stringify(ClassSubject),
          success: function (response) {
            console.log("Tambah data berhasil!", response);
            alert("Tambah data berhasil");
            window.location.href = "mahasiswa.html";
          },
          error: function (xhr, status, error) {
            if (xhr.status === 401) {
              refreshAccessToken(tambahData);
            } else if (xhr.status === 400) {
              window.location.href = "/index.html";
            }
            console.log("Tambah data gagal!", error);
            alert("Tambah data gagal");
            window.location.href = "mahasiswa.html";
          },
        });
      }

      document.addEventListener("DOMContentLoaded", function () {
        muatDataKelas()
          .then(function () {
            loadKelas();
          })
          .catch(function (error) {
            console.error("Terjadi kesalahan saat memuat data API:", error);
          });

        const token = $.cookie("token");
        let data = decodeJWT(token);
        if (data.role != "admin") {
          window.location.href = "http://127.0.0.1:5500/index.html";
        }

        muatDataMatakuliah()
          .then(function () {
            loadMatakuliah();
            const container = document.getElementById("listMatakuliah");

            container.addEventListener("change", getSelectedCourses);
          })
          .catch(function (error) {
            console.error("Terjadi kesalahan saat memuat data API:", error);
          });
      });
    </script>
  </body>
</html>
