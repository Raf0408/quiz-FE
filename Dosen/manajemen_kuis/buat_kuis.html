<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dosen - Tambah Soal</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jwt-decode@4.0.0/build/jwt-decode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-cookie/1.4.1/jquery.cookie.min.js"></script>

    <style>
      body {
        background-color: #f1f5f9;
        font-family: "Segoe UI", sans-serif;
        margin: 0;
      }
      .container-flex {
        display: flex;
        min-height: 100vh;
      }

      .sidebar {
        background-color: #1d2d44;
        color: white;
        height: 100vh;
        width: 250px;
        border-right: 2px solid #e2e8f0;
        transition: width 0.3s ease;
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 1rem;
      }

      .sidebar.collapsed {
        width: 80px;
      }

      .sidebar .nav-link {
        color: #f1f4f5;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 10px;
        transition: all 0.3s ease;
        padding: 0.5rem 0.75rem;
        border-radius: 8px;
      }

      .sidebar .nav-link:hover {
        background-color: #334155;
        color: white;
      }

      .sidebar .nav-link span {
        transition: opacity 0.3s ease;
      }

      .sidebar.collapsed .nav-link span,
      .sidebar.collapsed .logout-text,
      .sidebar.collapsed .logo-title,
      .sidebar.collapsed .profile-info {
        display: none !important;
      }

      .sidebar.collapsed .nav-link {
        justify-content: center;
      }

      .sidebar.collapsed .logout-btn {
        width: auto;
        padding: 0.5rem;
        justify-content: center;
      }

      .active {
        background-color: #334155;
        color: #fff;
        border-radius: 10px;
      }

      .line-icon {
        width: 100%;
        margin: 10px 0;
      }

      .profile-img {
        width: 40px;
        height: 40px;
        object-fit: cover;
        border-radius: 50%;
      }

      .logout-btn {
        background-color: #f1f4f5;
        color: #1d2d44;
        border-radius: 5px;
        width: 100%;
        transition: width 0.3s ease;
        border: none;
        padding: 0.5rem 1rem;
        font-weight: 600;
        cursor: pointer;
      }

      .logout-btn:hover {
        background-color: #e2e8f0;
      }

      .sidebar-icon {
        width: 18px;
        height: 18px;
      }

      .logo-geser {
        width: 15px;
        cursor: pointer;
        transition: transform 0.3s ease;
      }

      .logo-title {
        font-size: 1.25rem;
        transition: opacity 0.3s ease;
        margin: 0;
      }

      .logo-wrap {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .main-content {
        flex-grow: 1;
        padding: 40px;
        background-color: #f1f5f9;
      }

      .form-box {
        max-width: 600px;
        margin-left: auto;
        margin-right: auto;
      }

      .custom-btn {
        background-color: #1e2a3a;
        color: white;
        border: none;
        border-radius: 10px;
        padding: 10px 20px;
      }

      .custom-btn:hover {
        background-color: #2a3e50;
      }

      .kembali {
        color: #1e2a3a;
      }
    </style>
  </head>
  <body>
    <div class="container-flex">
      <!-- Sidebar -->
      <div id="sidebar-container"></div>

      <!-- Main Content -->
      <div class="main-content">
        <a
          href="manajemen_kuis.html"
          class="kembali d-block mb-3 text-decoration-none"
          >&larr; Kembali</a
        >
        <h2 class="mb-1">Buat Kuis</h2>
        <p class="text-muted mb-4">
          Welcome back! Jacob Jones. Here's an overview of your teaching
          activities.
        </p>

        <div class="form-box bg-white p-4 rounded shadow-sm">
          <h5 class="fw-bold mb-3">Informasi Kuis</h5>
          <p class="text-muted">Masukkan informasi detail kuis</p>

          <form id="formBuatKuis">
            <div class="mb-3">
              <label for="kelas" class="form-label fw-semibold">Kelas</label>
              <select class="form-select" id="kelas" required>
                <option value="">Pilih Kelas</option>
              </select>
            </div>

            <div class="mb-3">
              <label for="mataKuliah" class="form-label fw-semibold"
                >Mata Kuliah</label
              >
              <select class="form-select" id="mataKuliah" required>
                <option value="">Pilih Mata Kuliah</option>
              </select>
            </div>

            <div class="mb-3">
              <label for="soal" class="form-label fw-semibold">Soal</label>
              <select class="form-select" id="soal" required>
                <option value="">Pilih Soal</option>
              </select>
            </div>

            <div class="mb-4">
              <label for="deadline" class="form-label fw-semibold"
                >Deadline</label
              >
              <input type="date" class="form-control" id="deadline" required />
            </div>

            <button type="submit" class="custom-btn w-100">Buat Kuis</button>
          </form>
        </div>
      </div>
    </div>

    <!-- Load Sidebar -->
    <script src="../../Admin/assets/custom.js"></script>
    <script>
      let datas = [];
      function muatDataKelas() {
        return $.ajax({
          url: `${API_URL}/api-lecturer/courses-by-user-with-class`,
          type: "GET",
          xhrFields: {
            withCredentials: true,
          },
          success: function (response) {
            datas.push(response.data.items);
            var selectKelas = $("#kelas");
            selectKelas.empty().append('<option value="">Pilih Kelas</option>');

            const all_classes = response.data.items.flatMap(
              (mataKuliah) => mataKuliah.classes
            );

            const seenIds = new Set();
            const uniqueClasses = all_classes.filter((kelas) => {
              const isDuplicate = seenIds.has(kelas.id);
              seenIds.add(kelas.id);
              return !isDuplicate;
            });

            uniqueClasses.forEach((kelasItem) => {
              var option = $(`<option></option>`)
                .val(kelasItem.id)
                .text(kelasItem.name);
              selectKelas.append(option);
            });
          },

          error: function (xhr) {
            if (xhr.status === 401) {
              refreshAccessToken(muatDataApi);
            } else if (xhr.status === 400) {
              window.location.href = "/index.html";
            }

            console.error("Error memuat data:", xhr);
          },
        });
      }

      function muatDataSoal() {
        const selectedValue = $("#mataKuliah").val();
        if (selectedValue === "") {
          var selectSoal = $("#soal");
          selectSoal.empty();
          selectSoal.append(`<option value="">Pilih Soal</option>`);
          return;
        }

        return $.ajax({
          url: `${API_URL}/api-lecturer/question/${selectedValue}`,
          type: "GET",
          xhrFields: {
            withCredentials: true,
          },
          success: function (response) {
            console.log(response.data);
            var selectSoal = $("#soal");
            selectSoal.empty();
            selectSoal.append(`<option value="">Pilih Soal</option>`);
            response.data.forEach((item) => {
              var option = $("<option></option>").val(item.id).text(item.name);
              selectSoal.append(option);
            });
          },

          error: function (xhr) {
            if (xhr.status === 401) {
              refreshAccessToken(muatDataApi);
            } else if (xhr.status === 400) {
              window.location.href = "/index.html";
            }

            console.error("Error memuat data:", xhr);
          },
        });
      }

      function muatMatakuliah() {
        const selectedKelasId = parseInt(this.value, 10);

        var selectMataKuliah = $("#mataKuliah");
        selectMataKuliah.empty();
        selectMataKuliah.append('<option value="">Pilih Mata Kuliah</option>');

        if (!selectedKelasId) {
          return;
        }

        const filteredCourses = datas[0].filter((item) => {
          return item.classes.some((kelas) => kelas.id === selectedKelasId);
        });

        if (filteredCourses.length > 0) {
          filteredCourses.forEach((item) => {
            var option = $("<option></option>")
              .val(item.course.course_code)
              .text(item.course.name);
            selectMataKuliah.append(option);
          });
        } else {
          console.log(
            `Tidak ada mata kuliah yang ditemukan untuk kelas dengan ID: ${selectedKelasId}`
          );
        }
      }

      document.addEventListener("DOMContentLoaded", function () {
        fetch("../sidebar.html")
          .then((response) => response.text())
          .then((data) => {
            document.getElementById("sidebar-container").innerHTML = data;

            const geserBtn = document.getElementById("geserSidebar");
            const sidebar = document.querySelector(".sidebar");

            if (geserBtn && sidebar) {
              let isCollapsed = false;
              geserBtn.addEventListener("click", () => {
                sidebar.classList.toggle("collapsed");
                isCollapsed = !isCollapsed;

                geserBtn.src = isCollapsed
                  ? "../../Gambar/icon/panah_kanan.svg"
                  : "../../Gambar/icon/panah_kiri.svg";
              });
            }

            const token = $.cookie("token");
            let dataToken = decodeJWT(token);
            if (dataToken.role != "dosen") {
              window.location.href = "http://127.0.0.1:5500/index.html";
            }

            const currentPath = window.location.pathname.split("/").pop();
            document.querySelectorAll(".nav-link").forEach((link) => {
              const linkPath = link.getAttribute("href").split("/").pop();
              link.classList.toggle("active", currentPath === linkPath);
            });
          });

        document
          .getElementById("mataKuliah")
          .addEventListener("change", muatDataSoal);

        document
          .getElementById("kelas")
          .addEventListener("change", muatMatakuliah);

        muatDataKelas();
      });
    </script>

    <!-- Form Script -->
    <script>
      document
        .getElementById("formBuatKuis")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          const kuis = {
            class_id: parseInt(document.getElementById("kelas").value),
            course_code: document.getElementById("mataKuliah").value,
            question_id: parseInt(document.getElementById("soal").value),
            deadline: document.getElementById("deadline").value,
          };

          $.ajax({
            url: `${API_URL}/api-lecturer/quizz`,
            type: "POST",
            xhrFields: {
              withCredentials: true,
            },
            contentType: "application/json",
            data: JSON.stringify(kuis),
            success: function (response) {
              alert("Kuis berhasil dibuat!");
              window.location.href = "manajemen_kuis.html";
            },
            error: function (xhr, status, error) {
              if (xhr.status === 400) {
                window.location.href = "/index.html";
              }

              console.log("Tambah data gagal!", error);
              alert("kuis gagal dibuat");
              window.location.href = "manajemen_kuis.html";
            },
          });
        });
    </script>
  </body>
</html>
