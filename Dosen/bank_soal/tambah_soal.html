        justify-content: space-between;
        padding: 1rem;
      }

      .sidebar.collapsed {

      }

      .sidebar .nav-link {
        color: #f1f4f5;

        display: flex;
        align-items: center;

        color: #fff;

      .logout-btn {

      .logout-btn:hover {

        align-items: center;
        gap: 0.5rem;
      }

      .sidebar {
        position: fixed;
        top: 0;
        left: 0;

        overflow: hidden;
      }

      .main-content {
        flex-grow: 1;
        padding: 40px;
        background-color: #f1f5f9;
        margin-left: 250px;
      }

      .badge.bg-secondary {
        background-color: #6c757d;
        font-size: 0.8rem;
        padding: 0.4em 0.6em;
        border-radius: 10px;
      }
      .kembali {
        color: #1e2a3a; /* Warna teks */
      }
      .custom-btn {
        background-color: #1e2a3a;
        color: white;
        border: none;
        border-radius: 10px;
        padding: 10px 20px;
      }
      .custom-btn:hover {
        background-color: #2a3e50;
      }

        border-radius: 8px;
        padding: 10px 14px;
        border: 1px solid #cbd5e1;

      <!-- Main Content -->

              <!-- <form> -->
              <div class="mb-3">
                <label for="namaSoal" class="form-label fw-semibold"

                <input
                  type="text"
                  class="form-control"
                  id="namaSoal"

                />
                <input type="hidden" class="form-control" id="courseCode" />
              </div>
              <div class="mb-3">

              </div>
              <div class="mb-3">
                <label for="waktuPengerjaan" class="form-label fw-semibold"

                >
                <input
                  type="number"
                  class="form-control"
                  id="waktuPengerjaan"
                  placeholder="Waktu Pengerjaan"
                />
              </div>
              <div class="mb-4">
                <label for="tanggalDibuat" class="form-label fw-semibold"

                <input
                  type="date"
                  class="form-control"
                  id="tanggalDibuat"

                />
              </div>
              <button
                type="submit"
                id="btnSelanjutnya"
                class="custom-btn w-100"

                Selanjutnya
              </button>
              <!-- </form> -->
            </div>

            <!-- DAFTAR SOAL SECTION -->
            <div
              id="daftarSection"
              class="bg-white shadow-sm p-4 rounded overflow-auto"
              style="
                display: none;
                border: 1px solid #e2e8f0;
                max-height: 600px;
              "
            >
              <h5 class="fw-bold mb-3">Buat Pertanyaan</h5>
              <p class="text-muted">Tambahkan pertanyaan baru ke dalam kuis</p>

              <div class="mb-3">
                <label for="pertanyaan">Pertanyaan</label>
                <textarea
                  class="form-control"
                  id="pertanyaan"
                  rows="2"
                  placeholder="Masukkan soal"
                ></textarea>
              </div>

              <div class="mb-3">
                <label>Jawaban pilihan ganda</label>
                <div id="pilihanGanda">
                  <div class="form-check mt-2">
                    <input
                      type="radio"
                      class="form-check-input"
                      name="jawaban"
                    />
                    <input
                      type="text"
                      class="form-control d-inline-block w-75 ms-2"
                      placeholder="Masukkan jawaban A"
                    />
                  </div>
                  <div class="form-check mt-2">
                    <input
                      type="radio"
                      class="form-check-input"
                      name="jawaban"
                    />
                    <input
                      type="text"
                      class="form-control d-inline-block w-75 ms-2"
                      placeholder="Masukkan jawaban B"
                    />
                  </div>
                  <div class="form-check mt-2">
                    <input
                      type="radio"
                      class="form-check-input"
                      name="jawaban"
                    />
                    <input
                      type="text"
                      class="form-control d-inline-block w-75 ms-2"
                      placeholder="Masukkan jawaban C"
                    />
                  </div>
                  <div class="form-check mt-2 mb-3">
                    <input
                      type="radio"
                      class="form-check-input"
                      name="jawaban"
                    />
                    <input
                      type="text"
                      class="form-control d-inline-block w-75 ms-2"
                      placeholder="Masukkan jawaban D"
                    />
                  </div>
                </div>
                <button
                  id="btnTambahPertanyaan"

                  Tambah Pertanyaan

              </div>

              <!-- List Soal Akan Ditampilkan Di Sini -->

    <!-- Script Load Sidebar -->
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        fetch("../sidebar.html")
          .then((response) => response.text())
          .then((data) => {
            document.getElementById("sidebar-container").innerHTML = data;

            // Sidebar geser
            const geserBtn = document.getElementById("geserSidebar");
            const sidebar = document.querySelector(".sidebar");

            if (geserBtn && sidebar) {
              let isCollapsed = false;
              geserBtn.addEventListener("click", () => {
                sidebar.classList.toggle("collapsed");
                isCollapsed = !isCollapsed;

                geserBtn.src = isCollapsed
                  ? "../../Gambar/icon/panah_kanan.svg"
                  : "../../Gambar/icon/panah_kiri.svg";
              });
            }

            // active sidebar
            const currentPath = window.location.pathname.split("/").pop();
            const navLinks = document.querySelectorAll(".nav-link");

            navLinks.forEach((link) => {
              const linkPath = link.getAttribute("href").split("/").pop();

              if (currentPath === linkPath) {
                link.classList.add("active");
              } else {
                link.classList.remove("active");
              }
            });

            const token = $.cookie("token");
            let dataToken = decodeJWT(token);
            if (dataToken.role != "dosen") {
              window.location.href = "http://127.0.0.1:5500/index.html";
            }
          });
      });
    </script>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const urlParams = new URLSearchParams(window.location.search);
        const paramValue = urlParams.get("courseCode");
        document.getElementById("courseCode").value = paramValue;

        const btnInfo = document.getElementById("btnInfo");
        const btnDaftar = document.getElementById("btnDaftar");
        const infoSection = document.getElementById("infoSection");
        const daftarSection = document.getElementById("daftarSection");
        const btnSelanjutnya = document.getElementById("btnSelanjutnya");

        const today = new Date().toISOString().split("T")[0];
        document.getElementById("tanggalDibuat").value = today;

        btnInfo.addEventListener("click", function () {
          infoSection.style.display = "block";
          daftarSection.style.display = "none";
          btnInfo.classList.add("custom-btn");
          btnInfo.classList.remove("btn", "btn-light", "text-dark");
          btnDaftar.classList.remove("custom-btn");
          btnDaftar.classList.add("btn", "btn-light", "text-dark");
        });

        btnSelanjutnya.addEventListener("click", function () {
          infoSection.style.display = "none";
          daftarSection.style.display = "block";
          btnDaftar.classList.add("custom-btn");
          btnDaftar.classList.remove("btn", "btn-light", "text-dark");
          btnInfo.classList.remove("custom-btn");
          btnInfo.classList.add("btn", "btn-light", "text-dark");
        });

        btnDaftar.addEventListener("click", function () {
          infoSection.style.display = "none";
          daftarSection.style.display = "block";
          btnDaftar.classList.add("custom-btn");
          btnDaftar.classList.remove("btn", "btn-light", "text-dark");
          btnInfo.classList.remove("custom-btn");
          btnInfo.classList.add("btn", "btn-light", "text-dark");
        });
      });
    </script>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        let jumlah = 3;

        document
          .getElementById("jumlahSoal")
          .addEventListener("input", function () {
            jumlah = parseInt(this.value, 10);
            console.log(`jumlah berubah: ${jumlah}`);
          });

        const btnTambah = document.getElementById("btnTambahPertanyaan");
        let nomorUrutState = { nomorUrut: 1 };

        const handler = {
          set(target, key, value) {
            console.log(`nomorUrut berubah: ${target[key]} → ${value}`);
            target[key] = value;

            if (value > jumlah) {
              btnTambah.innerHTML = "Simpan";
            } else {
              btnTambah.innerHTML = "Tambah Pertanyaan";
            }
          },
        };

        const state = new Proxy(nomorUrutState, handler);
        const soal = []; // Array untuk menyimpan soal

        btnTambah.addEventListener("click", function () {
          const isiTombol = btnTambah.innerHTML;

          if (isiTombol === "Simpan") {
            // Ambil data dari form
            const nama = document.getElementById("namaSoal").value;
            const jumlah = document.getElementById("jumlahSoal").value;
            const waktu = document.getElementById("waktuPengerjaan").value;
            const tanggal = document.getElementById("tanggalDibuat").value;
            const kodeKuis = document.getElementById("courseCode").value;
            let dataSoal = [];

            soal.forEach((item) => {
              dataSoal.push(item);
            });

            const dataQuestions = {
              name: nama,
              question_count: parseInt(jumlah),
              duration: parseInt(waktu),
              course_code: kodeKuis,
              question_detail: dataSoal,
            };

            console.log(dataQuestions);

            $.ajax({
              url: `${API_URL}/api-lecturer/questions`,
              type: "POST",
              xhrFields: {
                withCredentials: true,
              },
              contentType: "application/json",
              data: JSON.stringify(dataQuestions),
              success: function (response) {
                console.log("Tambah data berhasil!", response);
                alert("Tambah data berhasil");
                window.location.href = "bank_soal.html";
              },
              error: function (xhr, status, error) {
                if (xhr.status === 401) {
                  refreshAccessToken(tambahData);
                } else if (xhr.status === 400) {
                  window.location.href = "/index.html";
                }
                console.log("Tambah data gagal!", error);
                alert("Tambah data gagal");
                window.location.href = "bank_soal.html";
              },
            });

            return;
          }

          const pertanyaanText = document
            .getElementById("pertanyaan")
            .value.trim();
          const pilihanInputs = document.querySelectorAll(
            "#pilihanGanda input[type='text']"
          );
          const radioInputs = document.querySelectorAll(
            "#pilihanGanda input[type='radio']"
          );

          const selectedJawaban = Array.from(radioInputs).findIndex(
            (radio) => radio.checked
          );

          // Validasi input
          if (
            pertanyaanText === "" ||
            Array.from(pilihanInputs).some(
              (input) => input.value.trim() === ""
            ) ||
            selectedJawaban === -1
          ) {
            alert(
              "Silakan lengkapi pertanyaan, semua jawaban, dan pilih jawaban yang benar."
            );
            return;
          }

          // Simpan pertanyaan dan jawaban ke dalam array soal
          const jawabanPilihan = Array.from(pilihanInputs).map(
            (input, index) => ({
              choice: String.fromCharCode(65 + index).toLowerCase(),
              answer_text: input.value,
              benar: index === selectedJawaban,
            })
          );

          const jawabanBenar = jawabanPilihan[selectedJawaban]?.choice || null;

          soal.push({
            correct_answer: jawabanBenar,
            question_text: pertanyaanText,
            answers: jawabanPilihan,
          });

          // Tambahkan soal ke tampilan daftar
          const soalBaru = document.createElement("div");
          soalBaru.classList.add(
            "p-3",
            "border",
            "rounded",
            "mb-3",
            "bg-light"
          );
          soalBaru.innerHTML = `
              <h6 class="fw-bold mb-1">Soal ${state.nomorUrut}</h6>
              <p class="mb-2"><strong>Pertanyaan:</strong> ${pertanyaanText}</p>
              <ul>
                  ${jawabanPilihan
                    .map(
                      (jawaban) =>
                        `<li><strong>${jawaban.choice}:</strong> ${
                          jawaban.answer_text
                        }${
                          jawaban.benar
                            ? " <span style='color:green'>✔</span>"
                            : ""
                        }</li>`
                    )
                    .join("")}
              </ul>
          `;

          daftarSoalList.appendChild(soalBaru);

          // Reset field input
          document.getElementById("pertanyaan").value = "";
          pilihanInputs.forEach((input) => (input.value = ""));
          radioInputs.forEach((radio) => (radio.checked = false));

          state.nomorUrut++;
        });
      });
    </script>
