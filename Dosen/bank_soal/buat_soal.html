<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dosen - Bank Soal</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      /* Styles dipertahankan seperti semula */
      body {
        background-color: #f1f5f9;
        font-family: "Segoe UI", sans-serif;
        margin: 0;
      }
      .container-flex {
        display: flex;
        min-height: 100vh;
      }

      .sidebar {
        background-color: #1d2d44;
        color: white;
        height: 100vh;
        width: 250px;
        border-right: 2px solid #e2e8f0;
        transition: width 0.3s ease;
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 1rem;
      }

      .sidebar.collapsed {
        width: 80px;
      }

      .sidebar .nav-link {
        color: #f1f4f5;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 10px;
        transition: all 0.3s ease;
        padding: 0.5rem 0.75rem;
        border-radius: 8px;
      }

      .sidebar .nav-link:hover {
        background-color: #334155;
        color: white;
      }

      .sidebar .nav-link span {
        transition: opacity 0.3s ease;
      }

      .sidebar.collapsed .nav-link span,
      .sidebar.collapsed .logout-text,
      .sidebar.collapsed .logo-title,
      .sidebar.collapsed .profile-info {
        display: none !important;
      }

      .sidebar.collapsed .nav-link {
        justify-content: center;
      }

      .sidebar.collapsed .logout-btn {
        width: auto;
        padding: 0.5rem;
        justify-content: center;
      }

      .active {
        background-color: #334155;
        color: #fff;
        border-radius: 10px;
      }

      .line-icon {
        width: 100%;
        margin: 10px 0;
      }

      .profile-img {
        width: 40px;
        height: 40px;
        object-fit: cover;
        border-radius: 50%;
      }

      .logout-btn {
        background-color: #f1f4f5;
        color: #1d2d44;
        border-radius: 5px;
        width: 100%;
        transition: width 0.3s ease;
        border: none;
        padding: 0.5rem 1rem;
        font-weight: 600;
        cursor: pointer;
      }

      .logout-btn:hover {
        background-color: #e2e8f0;
      }

      .sidebar-icon {
        width: 18px;
        height: 18px;
      }

      .logo-geser {
        width: 15px;
        cursor: pointer;
        transition: transform 0.3s ease;
      }

      .logo-title {
        font-size: 1.25rem;
        transition: opacity 0.3s ease;
        margin: 0;
      }

      .logo-wrap {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .main-content {
        flex-grow: 1;
        padding: 40px;
        background-color: #f1f5f9;
      }
      .kembali {
        color: #1e2a3a;
      }
      .custom-btn {
        background-color: #1e2a3a;
        color: white;
        border: none;
        border-radius: 10px;
        padding: 10px 20px;
      }
      .custom-btn:hover {
        background-color: #2a3e50;
      }
    </style>
  </head>
  <body>
    <!-- Sidebar akan dimuat di sini -->
    <div class="container-flex">
      <!-- Sidebar -->
      <div id="sidebar-container"></div>

      <!-- Main Content -->
      <div class="main-content">
        <a
          href="bank_soal.html"
          class="kembali text-decoration-none mb-3 d-inline-block"
          >← Kembali</a
        >
        <div class="d-flex justify-content-between align-items-center mb-4">
          <div>
            <h2>Bank Soal</h2>
            <p class="text-muted">
              Yuk, kita lihat sekilas tentang sistem aplikasi kuis kamu
            </p>
          </div>
          <button
            class="custom-btn"
            onclick="window.location.href='tambah_soal.html'"
          >
            + Tambah Soal
          </button>
        </div>

        <div class="row g-4">
          <div id="soalSementara" class="row g-4"></div>
        </div>
      </div>
    </div>

    <!-- Script Load Sidebar -->
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        fetch("../sidebar.html")
          .then((response) => response.text())
          .then((data) => {
            document.getElementById("sidebar-container").innerHTML = data;

            // Sidebar geser
            const geserBtn = document.getElementById("geserSidebar");
            const sidebar = document.querySelector(".sidebar");

            if (geserBtn && sidebar) {
              let isCollapsed = false;
              geserBtn.addEventListener("click", () => {
                sidebar.classList.toggle("collapsed");
                isCollapsed = !isCollapsed;

                geserBtn.src = isCollapsed
                  ? "../../Gambar/icon/panah_kanan.svg"
                  : "../../Gambar/icon/panah_kiri.svg";
              });
            }

            // active sidebar
            const currentPath = window.location.pathname.split("/").pop();
            const navLinks = document.querySelectorAll(".nav-link");

            navLinks.forEach((link) => {
              const linkPath = link.getAttribute("href").split("/").pop();

              if (currentPath === linkPath) {
                link.classList.add("active");
              } else {
                link.classList.remove("active");
              }
            });
          });
      });
    </script>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const soalBaru = sessionStorage.getItem("soalBaru");
        const container = document.getElementById("soalSementara");

        if (soalBaru) {
          const soal = JSON.parse(soalBaru);

          const html = `
            <div class="col-md-4 col-lg-3">
              <div class="card shadow-sm">
                <div class="card-body">
                  <h5 class="card-title">
                    ${soal.nama}
                  </h5>
                  <p class="card-text mb-2">
                    <img src="../../Gambar/icon/jumlah_soal.svg" width="18" alt="icon" class="me-1" />
                    Jumlah Soal: ${soal.jumlah}<br/>
                    
                    <img src="../../Gambar/icon/waktu.svg" width="18" alt="icon" class="me-1" />
                    Waktu Pengerjaan: ${soal.waktu} menit<br/>
                    
                    <img src="../../Gambar/icon/tanggal.svg" width="18" alt="icon" class="me-1" />
                    Dibuat pada ${new Date(soal.tanggal).toLocaleDateString()}
                  </p>
                  <button class="btn btn-dark w-100">
                    Ubah
                  </button>
                </div>
              </div>
            </div>
          `;

          container.innerHTML = html;

          sessionStorage.removeItem("soalBaru");
        }
      });
    </script>
  </body>
</html>
